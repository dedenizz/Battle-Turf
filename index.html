<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürü - Ana Üs</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arka-plan: #0f1015; --panel: #1a1c23; --vurgu-renk: #00ffcc;
            --kirmizi-alarm: #ff3366; --metin: #ffffff; --metin-soluk: #8a8d98; --altin: #ffd700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: var(--arka-plan); color: var(--metin); font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* GİRİŞ EKRANI */
        #giris-ekrani { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--arka-plan); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .logo { font-size: 3rem; font-weight: 900; letter-spacing: -2px; color: var(--vurgu-renk); margin-bottom: 5px; text-shadow: 0 0 20px rgba(0,255,204,0.4); }
        .slogan { font-size: 0.8rem; color: var(--metin-soluk); margin-bottom: 40px; text-transform: uppercase; letter-spacing: 3px; }
        .giris-kutu { background: var(--panel); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid rgba(255,255,255,0.05); }
        .giris-kutu input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: none; background: #000; color: #fff; font-family: 'Roboto Mono', monospace; font-size: 1rem; text-align: center; outline: none; border: 1px solid transparent; transition: 0.3s; }
        .giris-kutu input:focus { border-color: var(--vurgu-renk); box-shadow: 0 0 15px rgba(0,255,204,0.2); }
        .giris-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--vurgu-renk); color: #000; font-weight: 900; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .giris-btn:active { transform: scale(0.95); }

        /* ÜST PANEL */
        .ust-bar { background: var(--panel); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .profil-ozet { display: flex; align-items: center; gap: 12px; }
        .seviye-badge { background: var(--vurgu-renk); color: #000; width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.8rem; }
        .oyuncu-ad { font-weight: 700; font-size: 1rem; }

        /* ANA İÇERİK */
        .icerik { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        /* RADAR KUTUSU */
        .radar-kutu { background: linear-gradient(135deg, #1a1c23 0%, #101116 100%); padding: 25px; border-radius: 24px; position: relative; overflow: hidden; border: 1px solid rgba(0,255,204,0.1); }
        .radar-kutu::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0,255,204,0.03) 0%, transparent 70%); pointer-events: none; }
        .radar-baslik { font-size: 0.7rem; font-weight: 900; color: var(--vurgu-renk); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .radar-baslik span { width: 8px; height: 8px; background: var(--vurgu-renk); border-radius: 50%; box-shadow: 0 0 10px var(--vurgu-renk); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .tasiyici-bilgi { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; line-height: 1.4; }
        .tasiyici-isim { color: var(--kirmizi-alarm); }
        
        .kod-giris { display: flex; gap: 10px; }
        .kod-giris input { flex: 1; background: #000; border: 1px solid #333; border-radius: 12px; padding: 12px; color: var(--vurgu-renk); font-family: 'Roboto Mono', monospace; font-weight: 700; font-size: 1.2rem; text-align: center; outline: none; }
        .kod-btn { background: var(--vurgu-renk); color: #000; border: none; border-radius: 12px; padding: 0 20px; font-weight: 900; font-size: 0.8rem; cursor: pointer; }

        /* ENVANTER */
        .bolum-baslik { font-size: 0.9rem; font-weight: 700; color: var(--metin-soluk); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .envanter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        .canavar-kart { background: var(--panel); aspect-ratio: 1; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; border: 1px solid rgba(255,255,255,0.03); transition: 0.2s; position: relative; overflow: hidden; }
        .canavar-kart img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        .canavar-kart .nadirlik-iz { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; }

        /* GACHA EKRANI (AÇILIŞ ANİMASYONU) */
        #gacha-ekrani { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; backdrop-filter: blur(10px); }
        .gacha-isik { width: 250px; height: 250px; background: var(--vurgu-renk); border-radius: 50%; filter: blur(80px); opacity: 0.2; position: absolute; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.2); opacity: 0.4; } }
        
        #gacha-sonuc { z-index: 210; width: 100%; max-width: 300px; }
        .resim-cerceve { width: 100%; aspect-ratio: 1; border-radius: 30px; border: 4px solid var(--vurgu-renk); overflow: hidden; margin-bottom: 25px; box-shadow: 0 0 40px rgba(0,255,204,0.3); }
        .resim-cerceve img { width: 100%; height: 100%; object-fit: cover; }
        .yeni-badge { background: var(--vurgu-renk); color: #000; padding: 5px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: 900; margin-bottom: 10px; display: inline-block; }
        .yeni-isim { font-size: 1.8rem; font-weight: 900; margin-bottom: 5px; }
        .yeni-nadir { font-family: 'Roboto Mono', monospace; color: var(--vurgu-renk); font-size: 0.9rem; margin-bottom: 30px; border: 1px solid; display: inline-block; padding: 2px 10px; border-radius: 5px; }
        
        .cikis-btn { background: #fff; color: #000; border: none; border-radius: 15px; padding: 15px 40px; font-weight: 900; font-size: 1rem; cursor: pointer; width: 100%; }

        /* MOBİL ALT MENÜ */
        .alt-menu { background: var(--panel); display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .menu-item { color: var(--metin-soluk); display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.6rem; font-weight: 700; text-decoration: none; cursor: pointer; }
        .menu-item.aktif { color: var(--vurgu-renk); }
        .menu-ikon { font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="giris-ekrani">
        <div class="logo">SÜRÜ</div>
        <div class="slogan">Cyber-Collective Network</div>
        <div class="giris-kutu">
            <input type="text" id="kullanici-ad" placeholder="KULLANICI ADI" autocomplete="off">
            <input type="password" id="kullanici-pin" placeholder="4 HANELİ PIN" maxlength="4" inputmode="numeric">
            <button class="giris-btn" onclick="girisYap()">BAĞLAN (VERİ YOK)</button>
            <p id="hata-mesaji" style="color: var(--kirmizi-alarm); font-size: 0.7rem; margin-top: 15px; text-align: center; display: none; font-weight: bold;"></p>
            <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:#444; font-size:0.6rem; margin-top:20px; cursor:pointer; text-decoration:underline;">CİHAZ MÜHRÜNÜ SIFIRLA</button>
        </div>
    </div>

    <div class="ust-bar">
        <div class="profil-ozet">
            <div class="seviye-badge" id="ust-seviye">1</div>
            <div>
                <div class="oyuncu-ad" id="ust-isim">OYUNCU</div>
                <div style="font-size: 0.6rem; color: var(--vurgu-renk); font-weight: bold;">STATÜ: AKTİF</div>
            </div>
        </div>
        <div style="font-size: 1.2rem; color: var(--altin); font-weight: 900;">$ 0</div>
    </div>

    <div class="icerik">
        <div class="radar-kutu">
            <div class="radar-baslik"><span></span> SİNYAL YAKALANDI: TAŞIYICI RADARDA</div>
            <div class="tasiyici-bilgi">
                Şu anki sinyal sahibi:<br>
                <span class="tasiyici-isim" id="radar-tasiyici">TARANIYOR...</span>
            </div>
            <div class="kod-giris">
                <input type="text" id="hedef-kod" placeholder="KODU GİR" maxlength="4" inputmode="numeric">
                <button class="kod-btn" onclick="koduCozVeCevir()">ÇÖZ</button>
            </div>
        </div>

        <div>
            <div class="bolum-baslik">
                <span>ENVANTER</span>
                <span id="canavar-sayisi" style="color: var(--vurgu-renk);">0/100</span>
            </div>
            <div class="envanter-grid" id="envanter-listesi">
                </div>
        </div>
    </div>

    <div id="gacha-ekrani">
        <div class="gacha-isik"></div>
        
        <div id="gacha-bekleme">
            <div class="logo" style="animation: pulse 1s infinite;">SİNYAL ÇÖZÜLÜYOR...</div>
            <p style="color: var(--metin-soluk); font-size: 0.8rem;">DNA VERİSİ AYRIŞTIRILIYOR</p>
        </div>

        <div id="gacha-sonuc" style="display: none;">
            <div class="yeni-badge">YENİ CANAVAR SİSTEME EKLENDİ</div>
            <div class="resim-cerceve" id="gacha-resim-cerceve">
                <img id="yeni-canavar-img" src="" alt="">
            </div>
            <div class="yeni-isim" id="yeni-canavar-isim">İSİM</div>
            <div class="yeni-nadir" id="yeni-canavar-nadir">YAYGIN</div>
            <button class="cikis-btn" onclick="gachaKapat()">ANA ÜSSE DÖN</button>
        </div>
    </div>

    <div class="alt-menu">
        <div class="menu-item aktif">
            <span class="menu-ikon">📡</span>
            <span>RADAR</span>
        </div>
        <div class="menu-item" onclick="alert('Pazar yakında açılacak!')">
            <span class="menu-ikon">⚖</span>
            <span>PAZAR</span>
        </div>
        <div class="menu-item" onclick="alert('Sıralama hesaplanıyor...')">
            <span class="menu-ikon">🏆</span>
            <span>LİDERLER</span>
        </div>
        <div class="menu-item" onclick="cikisYap()">
            <span class="menu-ikon">🚪</span>
            <span>ÇIKIŞ</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, collection, updateDoc, arrayUnion, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCzCI_RU9eE-MIeR-2jcwaLRz74hmRqnuQ",
            authDomain: "gameoftame-7c63f.firebaseapp.com",
            projectId: "gameoftame-7c63f",
            storageBucket: "gameoftame-7c63f.firebasestorage.app",
            messagingSenderId: "829948418870",
            appId: "1:829948418870:web:02373ec1d4b170049fb197"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let oyuncuVerisi = null;
        let oyuncuEnvanteri = [];
        let canavarHavuzu = { yaygin: [], nadir: [], destansi: [], efsanevi: [], mitik: [] };

        // 1. VERİLERİ ÇEK
        async function canavarlariVeritabanindanCek() {
            try {
                const querySnapshot = await getDocs(collection(db, "canavarlar"));
                let veriSayisi = 0;
                querySnapshot.forEach((doc) => {
                    const c = doc.data(); 
                    
                    // FİLTRE: Bozuk verileri (isimsiz veya resimsiz) havuzdan at!
                    if (!c.isim || !c.resim) return;

                    veriSayisi++;
                    const nadirlikKucuk = c.nadirlik ? c.nadirlik.toLowerCase() : "yaygın";
                    if(canavarHavuzu[nadirlikKucuk]) { canavarHavuzu[nadirlikKucuk].push(c); } 
                    else { canavarHavuzu.yaygin.push(c); }
                });
                document.querySelector(".giris-btn").innerText = `BAĞLAN (${veriSayisi} CANAVAR)`;
            } catch (e) { console.error("Hata:", e); }
        }
        canavarlariVeritabanindanCek();

        // 2. GİRİŞ SİSTEMİ (CİHAZ MÜHÜRLÜ)
        window.girisYap = async function() {
            const isim = document.getElementById("kullanici-ad").value.trim();
            const pin = document.getElementById("kullanici-pin").value.trim();
            const hata = document.getElementById("hata-mesaji");

            if(!isim || pin.length < 4) { alert("Geçerli isim ve 4 haneli PIN gir!"); return; }

            // Mühür Kontrolü
            const muhur = localStorage.getItem("cihaz_muhru");
            if(muhur && muhur !== isim) {
                hata.innerText = `⚠ İHLAL: Cihaz ${muhur.toUpperCase()} adına mühürlü!`;
                hata.style.display = "block";
                return;
            }

            const docRef = doc(db, "players", isim);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                if (docSnap.data().pin === pin) {
                    basariliGiris(isim, docSnap.data());
                } else {
                    hata.innerText = "⚠ Hatalı PIN! Kurucuya başvur.";
                    hata.style.display = "block";
                }
            } else {
                const yeniVeri = { isim: isim, pin: pin, seviye: 1, envanter: [], kullanilanKodlar: [] };
                await setDoc(docRef, yeniVeri);
                basariliGiris(isim, yeniVeri);
            }
        };

        function basariliGiris(id, veri) {
            localStorage.setItem("oyuncuID", id);
            localStorage.setItem("cihaz_muhru", id);
            oyuncuVerisi = veri;
            oyuncuEnvanteri = veri.envanter || [];
            document.getElementById("giris-ekrani").style.display = "none";
            arayuzuGuncelle();
        }

        // 3. ARAYÜZ GÜNCELLEME
        function arayuzuGuncelle() {
            const id = localStorage.getItem("oyuncuID");
            if(!id) return;

            document.getElementById("ust-isim").innerText = id.toUpperCase();
            document.getElementById("ust-seviye").innerText = oyuncuVerisi.seviye || 1;
            document.getElementById("canavar-sayisi").innerText = `${oyuncuEnvanteri.length}/100`;

            const liste = document.getElementById("envanter-listesi");
            liste.innerHTML = "";
            
            oyuncuEnvanteri.forEach(c => {
                const kart = document.createElement("div");
                kart.className = "canavar-kart";
                kart.style.borderColor = c.renk || "#333";
                kart.innerHTML = `
                    <img src="${c.resim}" alt="${c.isim}">
                    <div class="nadirlik-iz" style="background: ${c.renk || '#fff'}"></div>
                `;
                liste.appendChild(kart);
            });
        }

        // 4. RADAR VE TAŞIYICI (CANLI)
        const tasiyiciRef = doc(db, "gameState", "carrier");
        onSnapshot(tasiyiciRef, (snap) => {
            if(snap.exists()) {
                const veri = snap.data();
                document.getElementById("radar-tasiyici").innerText = veri.hedefIsim.toUpperCase();
            }
        });

        // 5. KOD ÇÖZME VE KAZANMA (HİLE KORUMALI)
        window.koduCozVeCevir = async function() {
            const girilenKod = document.getElementById("hedef-kod").value.trim();
            const tasiyiciSnap = await getDoc(tasiyiciRef);
            
            if (tasiyiciSnap.exists() && tasiyiciSnap.data().aktifKod === girilenKod && tasiyiciSnap.data().durum === "aktif") {
                const id = localStorage.getItem("oyuncuID");
                
                // --- HİLE KORUMASI ---
                const oyuncuSnap = await getDoc(doc(db, "players", id));
                const oyuncuVeri = oyuncuSnap.data();
                
                // Bu oyuncu bu kodu daha önce kullandı mı?
                if (oyuncuVeri.kullanilanKodlar && oyuncuVeri.kullanilanKodlar.includes(girilenKod)) {
                    alert("⛔ BU KODU ZATEN KULLANDIN! Başka bir taşıyıcı bekle.");
                    document.getElementById("hedef-kod").value = "";
                    return;
                }

                if(canavarHavuzu.yaygin.length === 0 && canavarHavuzu.nadir.length === 0) { alert("Havuzda canavar yok!"); return; }
                
                document.getElementById("hedef-kod").value = "";
                document.getElementById("gacha-ekrani").style.display = "flex";
                document.getElementById("gacha-bekleme").style.display = "flex";
                document.getElementById("gacha-sonuc").style.display = "none";
                
                // Şans Hesaplama
                const sans = Math.random() * 100;
                let havuzSecimi;
                if (sans <= 0.1 && canavarHavuzu.mitik.length > 0) havuzSecimi = canavarHavuzu.mitik;            
                else if (sans <= 5 && canavarHavuzu.efsanevi.length > 0) havuzSecimi = canavarHavuzu.efsanevi;      
                else if (sans <= 20 && canavarHavuzu.destansi.length > 0) havuzSecimi = canavarHavuzu.destansi;    
                else if (sans <= 50 && canavarHavuzu.nadir.length > 0) havuzSecimi = canavarHavuzu.nadir;        
                else havuzSecimi = canavarHavuzu.yaygin.length > 0 ? canavarHavuzu.yaygin : Object.values(canavarHavuzu).flat();                      

                if(!havuzSecimi || havuzSecimi.length === 0) { alert("Havuz boş!"); document.getElementById("gacha-ekrani").style.display = "none"; return;}

                const kazanilanCanavar = havuzSecimi[Math.floor(Math.random() * havuzSecimi.length)];
                
                setTimeout(async () => {
                    // HEM CANAVARI EKLE HEM KODU MÜHÜRLE
                    await updateDoc(doc(db, "players", id), { 
                        envanter: arrayUnion(kazanilanCanavar),
                        kullanilanKodlar: arrayUnion(girilenKod) 
                    });
                    
                    oyuncuEnvanteri.push(kazanilanCanavar); 
                    arayuzuGuncelle();
                    
                    document.getElementById("gacha-bekleme").style.display = "none";
                    document.getElementById("gacha-sonuc").style.display = "block";
                    document.getElementById("yeni-canavar-img").src = kazanilanCanavar.resim || "";
                    document.getElementById("gacha-resim-cerceve").style.borderColor = kazanilanCanavar.renk || "#fff";
                    document.getElementById("gacha-baslik").style.color = kazanilanCanavar.renk || "#fff";
                    
                    const isimMetni = document.getElementById("yeni-canavar-isim"); 
                    isimMetni.innerText = kazanilanCanavar.isim; 
                    isimMetni.style.color = kazanilanCanavar.renk || "#fff";
                    
                    const nadirlikMetni = document.getElementById("yeni-canavar-nadir"); 
                    nadirlikMetni.innerText = kazanilanCanavar.nadirlik ? kazanilanCanavar.nadirlik.toUpperCase() : "YAYGIN"; 
                    nadirlikMetni.style.color = kazanilanCanavar.renk || "#fff"; 
                    nadirlikMetni.style.borderColor = kazanilanCanavar.renk || "#fff";
                }, 2500); 
            } else { 
                alert("GEÇERSİZ KOD VEYA SÜRESİ DOLMUŞ!"); 
            }
        };

        window.gachaKapat = () => document.getElementById("gacha-ekrani").style.display = "none";
        window.cikisYap = () => { localStorage.removeItem("oyuncuID"); location.reload(); };

        // Sayfa yüklendiğinde otomatik giriş kontrolü
        const kayitliID = localStorage.getItem("oyuncuID");
        if(kayitliID) {
            getDoc(doc(db, "players", kayitliID)).then(s => { if(s.exists()) basariliGiris(kayitliID, s.data()); });
        }
    </script>
</body>
</html>
