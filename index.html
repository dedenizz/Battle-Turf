<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÜRÜ - Taşıyıcı Arayüzü</title>
    <style>
        :root {
            --neon-cyan: #00ffcc;
            --bg-dark: #0a0a0a;
            --panel-bg: #141414;
            --border-color: #333;
        }
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* SOL PANEL: KOLEKSİYON */
        #left-panel {
            flex: 2;
            padding: 30px;
            border-right: 2px solid var(--border-color);
            background: radial-gradient(circle at top left, #1a1a2e, var(--bg-dark));
            overflow-y: auto;
        }
        .header-title {
            color: var(--neon-cyan);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .card {
            background: #111;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,255,204,0.2); }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; margin-bottom: 8px; }
        .card h4 { margin: 0; font-size: 14px; }
        .card p { margin: 5px 0 0 0; font-size: 11px; color: #888; }

        /* SAĞ PANEL: KONTROL VE GİRİŞ */
        #right-panel {
            flex: 1;
            padding: 30px;
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        /* GİRİŞ EKRANI */
        #login-section { width: 100%; }
        input {
            background: black;
            border: 1px solid var(--neon-cyan);
            color: white;
            padding: 12px;
            margin: 10px 0;
            width: 80%;
            border-radius: 5px;
            text-align: center;
            font-size: 16px;
        }
        button {
            background: var(--neon-cyan);
            color: black;
            border: none;
            padding: 12px 20px;
            width: 85%;
            font-weight: bold;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: white; box-shadow: 0 0 15px var(--neon-cyan); }

        /* AKTİF TAŞIYICI EKRANI */
        #carrier-section { display: none; width: 100%; }
        .status-badge {
            display: inline-block;
            background: rgba(0, 255, 204, 0.1);
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .code-area {
            background: #000;
            border: 1px dashed #555;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div id="left-panel">
        <h2 class="header-title">Koleksiyonun</h2>
        <div id="collection-grid" class="grid-container">
            <p style="color: #666; text-align: center; width: 100%;">Bağlantı bekleniyor...</p>
        </div>
    </div>

    <div id="right-panel">
        
        <div id="login-section">
            <h1 style="color: var(--neon-cyan); margin-bottom: 5px;">Sisteme Bağlan</h1>
            <p style="color: #888; font-size: 14px; margin-bottom: 30px;">Taşıyıcı kimliğini doğrula</p>
            
            <input type="text" id="username" placeholder="Taşıyıcı Adı (Örn: Cagla)">
            <input type="password" id="pin" placeholder="4 Haneli Şifre" maxlength="4">
            <button onclick="login()">SİSTEMİ UYANDIR</button>
        </div>

        <div id="carrier-section">
            <div class="status-badge">SİSTEM AKTİF</div>
            <h2 style="margin: 0;">Hoş Geldin, <span id="display-name" style="color: var(--neon-cyan);"></span></h2>
            <p style="color: #aaa; margin-top: 5px;">Sen seçilmiş bir taşıyıcısın.</p>
            
            <div class="code-area">
                <h3 style="margin-top: 0; font-size: 16px;">Gizemli Kod Gir</h3>
                <input type="text" id="promo-code" placeholder="Kodu buraya yaz...">
                <button onclick="redeemCode()" style="width: 80%; padding: 10px;">KODU KULLAN</button>
            </div>
            
            <button onclick="logout()" style="background: transparent; border: 1px solid #555; color: #888; margin-top: 40px; width: auto; padding: 8px 15px;">Bağlantıyı Kes</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCzCI_RU9eE-MIeR-2jcwaLRz74hmRqnuQ",
          authDomain: "gameoftame-7c63f.firebaseapp.com",
          projectId: "gameoftame-7c63f",
          storageBucket: "gameoftame-7c63f.firebasestorage.app",
          messagingSenderId: "829948418870",
          appId: "1:829948418870:web:02373ec1d4b170049fb197"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // SAYFA YÜKLENDİĞİNDE OTURUMU KONTROL ET
        window.onload = function() {
            const savedUser = localStorage.getItem("tasiyiciAdi");
            if (savedUser) {
                showCarrierPanel(savedUser);
            } else {
                document.getElementById("collection-grid").innerHTML = "<p style='color: #666; width: 100%; text-align: center;'>Koleksiyonu görmek için giriş yapmalısın.</p>";
            }
        };

        // GİRİŞ YAPMA FONKSİYONU
        window.login = async function() {
            const username = document.getElementById("username").value.trim();
            const pin = document.getElementById("pin").value.trim();

            if (username === "" || pin.length !== 4) {
                alert("Lütfen taşıyıcı adını ve 4 haneli şifreni eksiksiz gir!");
                return;
            }

            // Burada şimdilik basit bir giriş yapıyoruz (Her giren kendi adıyla kaydediliyor)
            localStorage.setItem("tasiyiciAdi", username);
            showCarrierPanel(username);
        };

        // TAŞIYICI PANELİNİ GÖSTER VE KOLEKSİYONU YÜKLE
        function showCarrierPanel(username) {
            document.getElementById("login-section").style.display = "none";
            document.getElementById("carrier-section").style.display = "flex";
            document.getElementById("display-name").innerText = username;
            loadCollection();
        }

        // ÇIKIŞ YAP
        window.logout = function() {
            localStorage.removeItem("tasiyiciAdi");
            location.reload();
        };

        // KOD KULLANMA (Şimdilik Demo)
        window.redeemCode = function() {
            const code = document.getElementById("promo-code").value;
            if(code === "") {
                alert("Lütfen bir kod gir!");
            } else {
                alert("Bu kod geçersiz veya süresi dolmuş!");
                document.getElementById("promo-code").value = "";
            }
        }

        // FİREBASE'DEN CANAVARLARI ÇEK
        async function loadCollection() {
            const grid = document.getElementById("collection-grid");
            grid.innerHTML = "<p style='color: var(--neon-cyan);'>Veritabanı taranıyor...</p>";

            try {
                const querySnapshot = await getDocs(collection(db, "canavarlar"));
                grid.innerHTML = "";
                
                let count = 0;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    count++;
                    const color = data.renk || "#ffffff";
                    
                    grid.innerHTML += `
                        <div class="card" style="border-color: ${color}">
                            <img src="${data.resim}" alt="${data.isim}">
                            <h4 style="color: ${color}">${data.isim}</h4>
                            <p>${data.nadirlik}</p>
                        </div>
                    `;
                });

                if(count === 0) {
                    grid.innerHTML = "<p style='color: #888;'>Koleksiyonun şu an boş. Python botuyla canavar üretmen gerekiyor.</p>";
                }
            } catch (error) {
                grid.innerHTML = "<p style='color: red;'>Veritabanı bağlantısı koptu!</p>";
                console.error(error);
            }
        }
    </script>
</body>
</html>
