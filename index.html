<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürü - Ana Üs</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arka-plan: #0f1015; --panel: #1a1c23; --vurgu-renk: #00ffcc;
            --kirmizi-alarm: #ff3366; --metin: #ffffff; --metin-soluk: #8a8d98;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: var(--arka-plan); color: var(--metin); font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* GİRİŞ EKRANI */
        #giris-ekrani { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--arka-plan); z-index: 1000; display: flex; justify-content: center; align-items: center; text-align: center; }
        .giris-kutu { background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--vurgu-renk); width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.1); }
        
        .btn { background: var(--vurgu-renk); color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; font-size: 1rem; transition: 0.3s; margin-top: 20px; }
        .btn:active { transform: scale(0.95); }

        /* ANA OYUN PANELİ */
        #oyun-arayuzu { display: none; height: 100%; flex-direction: column; }
        .ust-bar { padding: 20px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2d3a; }
        .oyuncu-bilgi h2 { margin: 0; font-size: 1.2rem; color: var(--vurgu-renk); }
        
        .radar-bolumu { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; position: relative; }
        .radar-daire { width: 250px; height: 250px; border-radius: 50%; border: 2px solid #2a2d3a; display: flex; justify-content: center; align-items: center; position: relative; transition: 0.5s; }
        .radar-aktif { border-color: var(--kirmizi-alarm); box-shadow: 0 0 50px rgba(255, 51, 102, 0.3); animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .hedef-bilgi { text-align: center; margin-top: 30px; }
        .hedef-isim { font-size: 2rem; font-weight: 900; color: var(--kirmizi-alarm); text-shadow: 0 0 10px rgba(255, 51, 102, 0.5); }
        
        .kod-giris { margin-top: 20px; display: none; }
        .kod-input { background: #000; border: 2px solid var(--vurgu-renk); color: var(--vurgu-renk); padding: 15px; text-align: center; font-size: 1.5rem; width: 150px; border-radius: 10px; font-family: 'Roboto Mono', monospace; }

        /* GACHA MODAL */
        #gacha-ekrani { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .canavar-kart { text-align: center; animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes zoomIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="giris-ekrani">
        <div class="giris-kutu">
            <h1 style="font-size: 2rem; margin-bottom: 10px;">SÜRÜ // BAĞLANTI</h1>
            <p style="color: var(--metin-soluk); margin-bottom: 20px;">Sisteme erişmek için okul hesabınla giriş yap.</p>
            <button class="btn" onclick="googleIleGiris()">GOOGLE İLE KİMLİK DOĞRULA</button>
            <p id="giris-durum" style="margin-top: 15px; color: var(--kirmizi-alarm); font-size: 0.8rem;"></p>
        </div>
    </div>

    <div id="oyun-arayuzu">
        <div class="ust-bar">
            <div class="oyuncu-bilgi">
                <h2 id="oyuncu-adi">YÜKLENİYOR...</h2>
                <small id="oyuncu-seviye">SEVİYE 1 AVCI</small>
            </div>
            <button onclick="cikisYap()" style="background:none; border:1px solid #444; color:#fff; padding:5px 10px; border-radius:5px; font-size:10px;">ÇIKIŞ</button>
        </div>

        <div class="radar-bolumu">
            <div id="durum-etiket" style="color: var(--metin-soluk); margin-bottom: 10px; font-weight: bold;">TARAMA YAPILIYOR...</div>
            <div class="radar-daire" id="radar">
                <div id="radar-ic" style="font-size: 0.8rem; text-align: center; color: var(--metin-soluk);">SİNYAL BEKLENİYOR</div>
            </div>

            <div class="hedef-bilgi" id="hedef-panel" style="display: none;">
                <small style="color: var(--kirmizi-alarm); letter-spacing: 5px;">HEDEF TESPİT EDİLDİ</small>
                <div class="hedef-isim" id="hedef-isim">---</div>
                
                <div class="kod-giris" id="kod-giris-alani">
                    <input type="number" class="kod-input" id="kod-input" placeholder="0000">
                    <button class="btn" onclick="kodOnayla()">KODU AKTİVE ET</button>
                </div>
            </div>
        </div>
    </div>

    <div id="gacha-ekrani">
        <div id="gacha-bekleme">
            <h2 style="color: var(--vurgu-renk);">VERİ AYRIŞTIRILIYOR...</h2>
        </div>
        <div id="gacha-sonuc" class="canavar-kart" style="display: none;">
            <div id="gacha-resim-cerceve" style="border: 5px solid #fff; padding: 10px; border-radius: 20px; background: #000;">
                <img id="yeni-canavar-img" src="" style="width: 200px; height: 200px; object-fit: contain;">
            </div>
            <h1 id="yeni-canavar-isim" style="margin-top: 20px; font-size: 2.5rem;">---</h1>
            <div id="yeni-canavar-nadir" style="display: inline-block; padding: 5px 15px; border: 1px solid #fff; border-radius: 20px; font-weight: bold;">---</div>
            <button class="btn" onclick="gachaKapat()" style="margin-top: 30px;">ENVANTERE EKLE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCzCI_RU9eE-MIeR-2jcwaLRz74hmRqnuQ",
            authDomain: "gameoftame-7c63f.firebaseapp.com",
            projectId: "gameoftame-7c63f",
            storageBucket: "gameoftame-7c63f.firebasestorage.app",
            messagingSenderId: "829948418870",
            appId: "1:829948418870:web:02373ec1d4b170049fb197"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let aktifKullanici = null;
        let guncelHedefKod = null;

        // --- OKUL SAATLERİ (SİLME!) ---
        const teneffusler = [
            { id: "1_Teneffus", bas: "09:10", bit: "09:25" },
            { id: "2_Teneffus", bas: "10:05", bit: "10:15" },
            { id: "3_Teneffus", bas: "10:55", bit: "11:05" },
            { id: "4_Teneffus", bas: "11:45", bit: "11:55" },
            { id: "Ogle_Arasi", bas: "12:35", bit: "13:20" },
            { id: "5_Teneffus", bas: "14:00", bit: "14:10" },
            { id: "6_Teneffus", bas: "14:50", bit: "15:00" },
            { id: "Okul_Cikisi", bas: "15:40", bit: "23:59" } 
        ];

        function teneffusVarMi() {
            const simdi = new Date();
            const saatDakika = simdi.getHours().toString().padStart(2, '0') + ":" + simdi.getMinutes().toString().padStart(2, '0');
            return teneffusler.find(t => saatDakika >= t.bas && saatDakika <= t.bit);
        }

        // GOOGLE GİRİŞİ
        window.googleIleGiris = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const userDocRef = doc(db, "players", user.uid);
                const userDoc = await getDoc(userDocRef);

                if (!userDoc.exists()) {
                    await setDoc(userDocRef, {
                        isim: user.displayName.split(" ")[0].toLowerCase(),
                        email: user.email,
                        seviye: 1,
                        envanter: [],
                        kayitTarihi: Date.now()
                    });
                }
                location.reload();
            } catch (error) {
                document.getElementById("giris-durum").innerText = "Giriş hatası: " + error.message;
            }
        };

        // OTURUM KONTROLÜ
        onAuthStateChanged(auth, (user) => {
            if (user) {
                aktifKullanici = user;
                document.getElementById("giris-ekrani").style.display = "none";
                document.getElementById("oyun-arayuzu").style.display = "flex";
                document.getElementById("oyuncu-adi").innerText = user.displayName.toUpperCase();
                sistemiBaslat();
            }
        });

        function sistemiBaslat() {
            // Canlı Hedef Takibi
            onSnapshot(doc(db, "gameState", "carrier"), (docSnap) => {
                const data = docSnap.data();
                const suAnTeneffus = teneffusVarMi();

                if (data && data.durum === "aktif" && suAnTeneffus) {
                    guncelHedefKod = data.aktifKod;
                    document.getElementById("radar").classList.add("radar-aktif");
                    document.getElementById("hedef-panel").style.display = "block";
                    document.getElementById("hedef-isim").innerText = data.hedefIsim.toUpperCase();
                    document.getElementById("durum-etiket").innerText = "SİNYAL YAKALANDI!";
                    
                    // Eğer kullanıcı hedefin kendisi değilse kod girişini göster
                    if (aktifKullanici.uid !== data.hedefOyuncuID) {
                        document.getElementById("kod-giris-alani").style.display = "block";
                        document.getElementById("radar-ic").innerText = "HEDEF YAKINDA";
                    } else {
                        document.getElementById("kod-giris-alani").style.display = "none";
                        document.getElementById("radar-ic").innerText = "DİKKAT: HEDEF SENSİN!";
                    }
                } else {
                    document.getElementById("radar").classList.remove("radar-aktif");
                    document.getElementById("hedef-panel").style.display = "none";
                    document.getElementById("durum-etiket").innerText = suAnTeneffus ? "TARANIYOR..." : "SİSTEM KAPALI: DERS SAATİ";
                    document.getElementById("radar-ic").innerText = suAnTeneffus ? "HEDEF ARANIYOR" : "ZİL BEKLENİYOR";
                }
            });
        }

        window.kodOnayla = async () => {
            const girilenKod = document.getElementById("kod-input").value;
            if (girilenKod === guncelHedefKod) {
                document.getElementById("gacha-ekrani").style.display = "flex";
                
                // Rastgele canavar seçme simülasyonu
                const canavarlarSnap = await getDocs(collection(db, "canavarlar"));
                const canavarListesi = canavarlarSnap.docs.map(d => d.data());
                const kazanilan = canavarListesi[Math.floor(Math.random() * canavarListesi.length)];

                // Envantere Ekle (Güvenlik kuralı sayesinde sadece kendi hesabına ekler)
                await updateDoc(doc(db, "players", aktifKullanici.uid), {
                    envanter: arrayUnion(kazanilan)
                });

                // Sonucu Göster
                setTimeout(() => {
                    document.getElementById("gacha-bekleme").style.display = "none";
                    document.getElementById("gacha-sonuc").style.display = "block";
                    document.getElementById("yeni-canavar-img").src = kazanilan.resim;
                    document.getElementById("yeni-canavar-isim").innerText = kazanilan.isim;
                    document.getElementById("yeni-canavar-nadir").innerText = kazanilan.nadirlik.toUpperCase();
                }, 2000);
            } else {
                alert("YANLIŞ KOD! SİNYAL KAYBOLDU.");
            }
        };

        window.gachaKapat = () => location.reload();
        window.cikisYap = () => { auth.signOut(); location.reload(); };

    </script>
</body>
</html>
