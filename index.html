<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürü - Ana Üs</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arka-plan: #0f1015; --panel: #1a1c23; --vurgu-renk: #00ffcc;
            --kirmizi-alarm: #ff3366; --metin: #ffffff; --metin-soluk: #8a8d98;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: var(--arka-plan); color: var(--metin); font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #giris-ekrani { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--arka-plan); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .giris-kutu { background: var(--panel); padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #2a2c35; }
        .input-text { width: 100%; padding: 15px; margin: 20px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; font-size: 1.2rem; text-align: center; outline: none; font-family: 'Roboto Mono', monospace; }
        #kullanici-adi { text-transform: lowercase; }
        #kullanici-pin { letter-spacing: 5px; }
        .input-text:focus { border-color: var(--vurgu-renk); }
        .btn { background: var(--metin); color: #000; border: none; padding: 15px 30px; font-size: 1.1rem; font-weight: 900; border-radius: 10px; cursor: pointer; width: 100%; transition: 0.2s; text-transform: uppercase; }
        .btn:hover { background: var(--vurgu-renk); transform: scale(0.98); }

        .ust-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: var(--panel); border-bottom: 1px solid #2a2c35; }
        .oyuncu-isim { font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        .oyuncu-rutbe { font-size: 0.8rem; color: var(--vurgu-renk); text-transform: uppercase; letter-spacing: 2px; }

        .ana-ekran { display: flex; flex: 1; height: calc(100vh - 80px); }
        .sol-panel { flex: 1; padding: 30px; overflow-y: auto; border-right: 1px solid #2a2c35; }
        .baslik { font-size: 1.2rem; color: var(--metin-soluk); margin-bottom: 20px; font-weight: 700; letter-spacing: 1px; }
        
        /* KOLEKSİYON KARTLARI */
        .koleksiyon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .canavar-kart { background: #111; border: 1px solid #333; border-radius: 15px; padding: 15px; text-align: center; position: relative; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .canavar-resim { width: 100%; height: 110px; background: #222; border-radius: 10px; margin: 0 auto 10px auto; overflow: hidden; border: 1px solid #444; }
        .canavar-resim img { width: 100%; height: 100%; object-fit: cover; }
        .canavar-isim { font-weight: 900; font-size: 0.95rem; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .nadir-etiket { font-size: 0.7rem; font-weight: 900; padding: 4px 8px; border-radius: 5px; background: #000; display: inline-block; letter-spacing: 1px; }

        .sag-panel { width: 400px; background: #14151b; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; position: relative; }
        .radar-uyari { color: var(--kirmizi-alarm); font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 40px; text-align: center; }
        @keyframes yanipSonme { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .kod-kutusu { background: #000; border: 2px solid #333; border-radius: 15px; padding: 30px; text-align: center; width: 100%; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .kod-input { background: transparent; border: none; color: #fff; font-size: 4rem; width: 100%; text-align: center; font-family: 'Roboto Mono', monospace; outline: none; letter-spacing: 10px; margin-bottom: 20px;}
        .kod-input::placeholder { color: #333; }
        
        .btn-cevir { background: var(--kirmizi-alarm); color: #fff; padding: 20px; font-size: 1.3rem; border-radius: 10px; width: 100%; font-weight: 900; letter-spacing: 2px; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 20px rgba(255, 51, 102, 0.2); }
        .btn-cevir:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255, 51, 102, 0.4); }
        .btn-cevir:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }

        /* GACHA EKRANI */
        #gacha-ekrani { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .gacha-kapsul { width: 200px; height: 200px; background: #111; border-radius: 50%; border: 5px solid #555; display: flex; justify-content: center; align-items: center; font-size: 5rem; animation: hizliTitre 0.1s infinite; }
        @keyframes hizliTitre { 0% { transform: translate(2px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(0px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(2px, 1px) rotate(-1deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(2px, 2px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
        
        .gacha-sonuc { display: none; text-align: center; animation: dropIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes dropIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .yeni-resim { width: 250px; height: 250px; background: #000; border-radius: 20px; margin-bottom: 20px; border: 4px solid #fff; box-shadow: 0 0 50px rgba(255,255,255,0.2); overflow: hidden; }
        .yeni-resim img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>

            ],

                { isim: "Okyanus Hakimi", nadirlik: "EFSANEVİ", renk: "#ffaa00", resim: P_EFSANE }
            ],
            mitik: [ // %0.1 Şans - Sadece 1 Tane
                { isim: "KOD: OMEGA", nadirlik: "MİTİK", renk: "#ff3366", resim: P_MITIK }
            ]
        };

        let oyuncuEnvanteri = []; 

        window.hesapOlustur = async function() {
            const kullaniciAdi = document.getElementById("kullanici-adi").value.trim().toLowerCase();
            const pin = document.getElementById("kullanici-pin").value.trim();
            const durum = document.getElementById("giris-durum");
            if (kullaniciAdi.length < 3 || pin.length !== 4) { durum.innerText = "Hatalı İsim veya PIN."; return; }

            try {
                const playersRef = collection(db, "players");
                const q = query(playersRef, where("isim", "==", kullaniciAdi));
                const snap = await getDocs(q);

                if (!snap.empty) {
                    const playerData = snap.docs[0];
                    if (playerData.data().pin === pin) {
                        localStorage.setItem("oyuncuID", playerData.id);
                        localStorage.setItem("oyuncuIsim", playerData.data().isim);
                        sistemiBaslat();
                    } else { durum.innerText = "Hatalı PIN!"; }
                } else {
                    const docRef = await addDoc(collection(db, "players"), {
                        isim: kullaniciAdi, pin: pin, seviye: 1, kapasite: 50, envanter: []
                    });
                    localStorage.setItem("oyuncuID", docRef.id);
                    localStorage.setItem("oyuncuIsim", kullaniciAdi);
                    sistemiBaslat();
                }
            } catch (e) { console.error(e); }
        };

        window.sistemiBaslat = async function() {
            const id = localStorage.getItem("oyuncuID");
            const isim = localStorage.getItem("oyuncuIsim");
            if (id) {
                document.getElementById("giris-ekrani").style.display = "none";
                document.getElementById("ana-uygulama").style.display = "flex";
                document.getElementById("ekran-isim").innerText = isim.toUpperCase();
                const veri = await getDoc(doc(db, "players", id));
                if (veri.exists()) {
                    oyuncuEnvanteri = veri.data().envanter || [];
                    arayuzuGuncelle();
                }
            }
        };

        function arayuzuGuncelle() {
            const grid = document.getElementById("envanter-listesi");
            document.getElementById("koleksiyon-sayisi").innerText = oyuncuEnvanteri.length;
            grid.innerHTML = ""; 

            // Canavarları nadirliğe göre sırala (Mitik en üstte)
            const nadirlikSirasi = { "MİTİK": 5, "EFSANEVİ": 4, "DESTANSI": 3, "NADİR": 2, "YAYGIN": 1 };
            oyuncuEnvanteri.sort((a, b) => nadirlikSirasi[b.nadirlik] - nadirlikSirasi[a.nadirlik]);

            oyuncuEnvanteri.forEach(canavar => {
                const kart = document.createElement("div");
                kart.className = "canavar-kart";
                kart.style.borderColor = canavar.renk;
                // Kartın içine resmi koyuyoruz
                kart.innerHTML = `
                    <div class="canavar-resim">
                        <img src="${canavar.resim}" alt="${canavar.isim}">
                    </div>
                    <div class="canavar-isim" style="color: ${canavar.renk};">${canavar.isim}</div>
                    <div class="nadir-etiket" style="color: ${canavar.renk}; border: 1px solid ${canavar.renk}">${canavar.nadirlik}</div>
                `;
                grid.appendChild(kart);
            });
        }

        const teneffusler = [
            { id: "TEST_MODU", bas: "00:00", bit: "23:59" }, // TENEFFÜS KİLİDİ AÇIK (TEST İÇİN)
            { id: "Sabah_Teneffusu", bas: "09:30", bit: "09:50" },
            { id: "Ikinci_Teneffus", bas: "11:05", bit: "11:15" },

            { id: "Dorduncu_Teneffus", bas: "12:45", bit: "12:55" },
            { id: "Ogle_Arasi", bas: "13:35", bit: "14:15" },
            { id: "Son_Teneffus", bas: "14:55", bit: "15:00" }
        ];

        function saatiAl() { const d = new Date(); return d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0'); }

        async function zamanlayiciKontrol() {
            const anlikSaat = saatiAl();
            let aktifTeneffus = null;
            for (let t of teneffusler) { if (anlikSaat >= t.bas && anlikSaat < t.bit) { aktifTeneffus = t; break; } }
            const tRef = doc(db, "gameState", "carrier");
            const snap = await getDoc(tRef);

            if (aktifTeneffus) {
                if (!snap.exists() || snap.data().sonTeneffusID !== aktifTeneffus.id) {
                    await setDoc(tRef, { sonTeneffusID: aktifTeneffus.id, durum: "seciliyor" }, { merge: true });
                    const oyuncularSnap = await getDocs(collection(db, "players"));
                    const oyuncular = [];
                    oyuncularSnap.forEach(d => oyuncular.push({ id: d.id, isim: d.data().isim }));
                    if (oyuncular.length > 0) {
                        const secilen = oyuncular[Math.floor(Math.random() * oyuncular.length)];
                        const kod = Math.floor(1000 + Math.random() * 9000).toString();
                        await setDoc(tRef, { hedefOyuncuID: secilen.id, hedefIsim: secilen.isim, aktifKod: kod, durum: "aktif", sonTeneffusID: aktifTeneffus.id });
                    }
                }
            } else {
                if (snap.exists() && snap.data().durum === "aktif") { await updateDoc(tRef, { durum: "pasif" }); }
            }
        }
        
        zamanlayiciKontrol();
        setInterval(zamanlayiciKontrol, 15000);

        const tasiyiciRef = doc(db, "gameState", "carrier");
        onSnapshot(tasiyiciRef, (docSnap) => {
            const radar = document.getElementById("radar-durum");
            const avciModu = document.getElementById("avci-modu");
            const tasiyiciModu = document.getElementById("tasiyici-modu");
            const kodKutusu = document.getElementById("hedef-kod");
            const buton = document.querySelector(".btn-cevir");
            const benimID = localStorage.getItem("oyuncuID");

            if (docSnap.exists() && docSnap.data().durum === "aktif") {
                const data = docSnap.data();
                if (data.hedefOyuncuID === benimID) {
                    radar.style.display = "none"; avciModu.style.display = "none"; tasiyiciModu.style.display = "block";
                    document.getElementById("benim-kodum").innerText = data.aktifKod;
                } else {
                    radar.style.display = "block"; tasiyiciModu.style.display = "none"; avciModu.style.display = "block";
                    radar.innerText = `⚠ HEDEF TESPİT EDİLDİ: ${data.hedefIsim.toUpperCase()} ⚠`;
                    radar.style.color = "var(--kirmizi-alarm)"; radar.style.animation = "yanipSonme 2s infinite";
                    kodKutusu.disabled = false; buton.disabled = false;
                }
            } else {
                radar.style.display = "block"; tasiyiciModu.style.display = "none"; avciModu.style.display = "block";
                radar.innerText = "SİSTEM KAPALI: DERS SAATİ (Zili Bekleyin)";
                radar.style.color = "var(--metin-soluk)"; radar.style.animation = "none";
                kodKutusu.disabled = true; buton.disabled = true;
            }
        });

        // GACHA ALGORİTMASI (DROP RATES)
        window.koduCozVeCevir = async function() {
            const girilenKod = document.getElementById("hedef-kod").value.trim();
            const snap = await getDoc(tasiyiciRef);
            
            if (snap.exists() && snap.data().aktifKod === girilenKod && snap.data().durum === "aktif") {
                document.getElementById("hedef-kod").value = "";
                document.getElementById("gacha-ekrani").style.display = "flex";
                document.getElementById("gacha-bekleme").style.display = "flex";
                document.getElementById("gacha-sonuc").style.display = "none";
                
                // ŞANS HESAPLAMASI (RNG)
                const sans = Math.random() * 100; // 0 ile 100 arası sayı
                let havuzSecimi;

                if (sans <= 0.1) havuzSecimi = canavarHavuzu.mitik;           // %0.1 İhtimal
                else if (sans <= 5) havuzSecimi = canavarHavuzu.efsanevi;     // %4.9 İhtimal
                else if (sans <= 20) havuzSecimi = canavarHavuzu.destansi;    // %15 İhtimal
                else if (sans <= 50) havuzSecimi = canavarHavuzu.nadir;       // %30 İhtimal
                else havuzSecimi = canavarHavuzu.yaygin;                      // %50 İhtimal

                // Seçilen havuzdan rastgele bir canavar al
                const kazanilanCanavar = havuzSecimi[Math.floor(Math.random() * havuzSecimi.length)];
                
                setTimeout(async () => {
                    // Firebase'e kaydet
                    const id = localStorage.getItem("oyuncuID");
                    await updateDoc(doc(db, "players", id), { envanter: arrayUnion(kazanilanCanavar) });
                    
                    // Arayüzü güncelle
                    oyuncuEnvanteri.push(kazanilanCanavar);
                    arayuzuGuncelle();

                    // Gacha Sonuç Ekranını Hazırla (RENKLER VE RESİMLER)
                    document.getElementById("gacha-bekleme").style.display = "none";
                    document.getElementById("gacha-sonuc").style.display = "block";
                    
                    const resim = document.getElementById("yeni-canavar-img");
                    resim.src = kazanilanCanavar.resim;
                    
                    document.getElementById("gacha-resim-cerceve").style.borderColor = kazanilanCanavar.renk;
                    document.getElementById("gacha-baslik").style.color = kazanilanCanavar.renk;
                    
                    const isimMetni = document.getElementById("yeni-canavar-isim");
                    isimMetni.innerText = kazanilanCanavar.isim;
                    isimMetni.style.color = kazanilanCanavar.renk;
                    
                    const nadirlikMetni = document.getElementById("yeni-canavar-nadir");
                    nadirlikMetni.innerText = kazanilanCanavar.nadirlik;
                    nadirlikMetni.style.color = kazanilanCanavar.renk;
                    nadirlikMetni.style.borderColor = kazanilanCanavar.renk;

                }, 2500); // Kutu 2.5 saniye titrer
            } else {
                alert("GEÇERSİZ KOD!");
            }
        };

        window.gachaKapat = () => document.getElementById("gacha-ekrani").style.display = "none";
        window.cikisYap = () => { localStorage.clear(); location.reload(); };

    </script>
</body>
</html>
