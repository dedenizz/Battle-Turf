<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turf Wars - Premium UI</title>
    <style>
        /* Base Dark Theme */
        body { background-color: #050505; color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 20px; text-transform: uppercase; }
        
        /* The Top Status Bar */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .username { font-size: 1.5rem; color: #fff; font-weight: bold; text-shadow: 0 0 5px #fff; }
        .currency { color: #00ffcc; font-size: 1.2rem; }

        /* Alert Banner (When a hunt starts) */
        .alert-banner { background: rgba(255, 51, 102, 0.1); border: 1px solid #ff3366; color: #ff3366; text-align: center; padding: 15px; border-radius: 5px; margin-bottom: 30px; animation: pulse 2s infinite; font-weight: bold; letter-spacing: 2px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0px #ff3366; } 50% { box-shadow: 0 0 15px #ff3366; } 100% { box-shadow: 0 0 0px #ff3366; } }

        /* The Inventory Grid */
        h2 { color: #555; font-size: 1rem; margin-bottom: 15px; letter-spacing: 1px; }
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; }

        /* Item Cards */
        .entity-card { background: #111; border: 1px solid #333; border-radius: 8px; padding: 15px; text-align: center; position: relative; transition: transform 0.2s; cursor: pointer; }
        .entity-card:hover { transform: translateY(-5px); }
        
        /* Rarity Visuals (The Glow Effects) */
        .entity-card.common { border-color: #555; box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.05); }
        .entity-card.rare { border-color: #0088ff; box-shadow: 0 0 15px rgba(0, 136, 255, 0.2); }
        .entity-card.epic { border-color: #aa00ff; box-shadow: 0 0 20px rgba(170, 0, 255, 0.3); }
        .entity-card.legendary { border-color: #ffaa00; box-shadow: 0 0 25px rgba(255, 170, 0, 0.5); }
        
        /* The Shape inside the card */
        .entity-graphic { width: 50px; height: 50px; margin: 0 auto 10px auto; border-radius: 50%; background: #222; }
        .rare .entity-graphic { background: radial-gradient(circle, #0088ff, #001133); }
        .epic .entity-graphic { background: radial-gradient(circle, #aa00ff, #220033); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); border-radius: 0; }
        .legendary .entity-graphic { background: radial-gradient(circle, #ffaa00, #331100); clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); border-radius: 0; }

        .entity-name { font-size: 0.8rem; font-weight: bold; color: #ddd; }
        .entity-power { font-size: 0.7rem; color: #888; margin-top: 5px; }

        /* The Spin/Input Action Area */
        .action-area { margin-top: 40px; text-align: center; padding: 20px; background: #0a0a0a; border: 1px dashed #333; border-radius: 10px; }
        .input-code { background: transparent; border: none; border-bottom: 2px solid #00ffcc; color: #fff; font-size: 2rem; text-align: center; width: 150px; font-family: monospace; padding: 5px; outline: none; margin-bottom: 15px; }
        .spin-btn { background: #00ffcc; color: #000; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; font-family: monospace; cursor: pointer; border-radius: 5px; text-transform: uppercase; transition: 0.2s; }
        .spin-btn:hover { background: #fff; box-shadow: 0 0 20px #00ffcc; }
    </style>
</head>
<body>

    <div class="header">
        <div class="username">AGENT_ZERO</div>
        <div class="currency">1,450 COINS</div>
    </div>

    <div class="alert-banner">
        ! HOST DETECTED IN SECTOR !<br>
        <span style="font-size: 0.8rem; color: #aaa;">FIND THE GLOWING TABLET. 04:59 REMAINING.</span>
    </div>

    <h2>YOUR CORES</h2>
    
    <div class="inventory-grid">
        
        <div class="entity-card common">
            <div class="entity-graphic"></div>
            <div class="entity-name">BASE_FRAG</div>
            <div class="entity-power">PWR: 12</div>
        </div>

        <div class="entity-card rare">
            <div class="entity-graphic"></div>
            <div class="entity-name">NEON_SPARK</div>
            <div class="entity-power">PWR: 45</div>
        </div>

        <div class="entity-card epic">
            <div class="entity-graphic"></div>
            <div class="entity-name">VOID_PRISM</div>
            <div class="entity-power">PWR: 110</div>
        </div>

        <div class="entity-card legendary">
            <div class="entity-graphic"></div>
            <div class="entity-name">SOLAR_APEX</div>
            <div class="entity-power">PWR: 450</div>
        </div>

    </div>

    <div class="action-area">
        <p style="color: #666; margin-top: 0;">ENTER HOST CODE FOR A SPIN</p>
        <input type="text" class="input-code" placeholder="----" maxlength="4"><br>
        <button class="spin-btn">DECRYPT (SPIN)</button>
    </div>

</body>
</html>
