<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürü - Ana Üs (v2.0 Ultimate)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arka-plan: #0f1015; --panel: #1a1c23; --vurgu-renk: #00ffcc;
            --kirmizi-alarm: #ff3366; --metin: #ffffff; --metin-soluk: #8a8d98; --altin: #ffd700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: var(--arka-plan); color: var(--metin); font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* GİRİŞ EKRANI */
        #giris-ekrani { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--arka-plan); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .logo { font-size: 3rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 10px; color: var(--vurgu-renk); text-shadow: 0 0 20px rgba(0,255,204,0.3); }
        .giris-kutu { background: var(--panel); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid #333; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #333; background: #000; color: #fff; font-size: 1rem; margin-bottom: 15px; outline: none; }
        input:focus { border-color: var(--vurgu-renk); }
        .btn-ana { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--vurgu-renk); color: #000; font-weight: 900; font-size: 1rem; cursor: pointer; text-transform: uppercase; }

        /* ANA PANEL */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: var(--panel); border-bottom: 1px solid #333; }
        .oyuncu-bilgi { display: flex; flex-direction: column; }
        .oyuncu-isim { font-weight: 900; font-size: 1.2rem; }
        .oyuncu-istatistik { font-size: 0.8rem; color: var(--metin-soluk); font-family: 'Roboto Mono', monospace; }

        .ana-icerik { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }

        /* TAŞIYICI KARTI */
        .tasiyici-kart { background: var(--panel); width: 100%; max-width: 400px; padding: 25px; border-radius: 24px; border: 1px solid #333; position: relative; overflow: hidden; text-align: center; }
        .tasiyici-durum { font-size: 0.7rem; font-weight: 700; color: var(--vurgu-renk); letter-spacing: 2px; margin-bottom: 10px; }
        .kod-alani { background: #000; padding: 20px; border-radius: 15px; border: 1px dashed var(--vurgu-renk); margin: 15px 0; }
        .buyuk-kod { font-family: 'Roboto Mono', monospace; font-size: 2.5rem; font-weight: 700; color: var(--vurgu-renk); }

        /* ENVANTER */
        .envanter-ozet { margin-top: 30px; width: 100%; max-width: 400px; }
        .envanter-baslik { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; font-weight: 700; }
        .envanter-izgara { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .canavar-kutu { aspect-ratio: 1; background: var(--panel); border-radius: 12px; border: 1px solid #333; overflow: hidden; position: relative; }
        .canavar-kutu img { width: 100%; height: 100%; object-fit: cover; }

        /* MODAL EKRANLARI */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .sira-satir { display: flex; justify-content: space-between; width: 100%; padding: 15px; background: #111; margin-bottom: 8px; border-radius: 10px; }
        
        /* GACHA SONUÇ */
        #gacha-sonuc-kutu { text-align: center; }
        .yeni-canavar-resim { width: 200px; height: 200px; border-radius: 20px; border: 5px solid var(--vurgu-renk); margin: 20px 0; object-fit: cover; }
    </style>
</head>
<body>

    <div id="giris-ekrani">
        <div class="logo">SÜRÜ</div>
        <div class="giris-kutu">
            <input type="text" id="kullanici-adi" placeholder="AVCI ADINI YAZ...">
            <button class="btn-ana" onclick="girisYap()">SİSTEME SIZ</button>
        </div>
    </div>

    <header>
        <div class="oyuncu-bilgi">
            <span class="oyuncu-isim" id="ust-isim">---</span>
            <span class="oyuncu-istatistik" id="ust-skor">Lv.1 | 0 PUAN</span>
        </div>
        <button onclick="liderlikAc()" style="background:none; border:1px solid #444; color:white; padding:8px 15px; border-radius:8px; font-weight:bold;">🏆 SIRALAMA</button>
    </header>

    <div class="ana-icerik">
        <div class="tasiyici-kart" id="tasiyici-panel">
            <div class="tasiyici-durum" id="tasiyici-baslik">SİNYAL ARANIYOR...</div>
            <div id="kod-yazisi" style="display:none;">
                <p style="font-size: 0.9rem; margin-bottom: 5px;">SEN TAŞIYICISIN! KODUN:</p>
                <div class="kod-alani">
                    <span class="buyuk-kod" id="benim-kodum">----</span>
                </div>
                <p style="font-size: 0.7rem; color: var(--metin-soluk);">KODUNU DİĞERLERİYLE PAYLAŞ, ONLAR KAZANDIKÇA SEN DE KAZAN!</p>
            </div>
            
            <div id="avci-yazisi">
                <p style="font-size: 0.9rem; margin-bottom: 10px;">BİR TAŞIYICI TESPİT EDİLDİ: <br><b id="hedef-isim" style="color:var(--kirmizi-alarm); font-size: 1.4rem;">...</b></p>
                <input type="text" id="hedef-kod" placeholder="KODU BURAYA GİR" style="text-align:center; font-family: 'Roboto Mono';">
                <button class="btn-ana" onclick="koduCozVeCevir()">KODU ÇÖZ VE AVLA</button>
            </div>
        </div>

        <div class="envanter-ozet">
            <div class="envanter-baslik">
                <span>KOLEKSİYONUN</span>
                <span id="sayac-text">0/∞</span>
            </div>
            <div class="envanter-izgara" id="koleksiyon-onizleme">
                </div>
        </div>
    </div>

    <div id="gacha-ekrani" class="modal">
        <div id="gacha-bekleme">
            <div class="logo" style="animation: pulse 1s infinite;">AVLANILIYOR...</div>
        </div>
        <div id="gacha-sonuc" style="display:none; text-align:center;">
            <h2 id="gacha-baslik">YENİ CANAVAR!</h2>
            <img id="yeni-canavar-img" class="yeni-canavar-resim" src="">
            <h3 id="yeni-canavar-isim">---</h3>
            <div id="yeni-canavar-nadir" style="display:inline-block; padding:5px 15px; border-radius:20px; font-weight:900;">---</div>
            <br><br>
            <button class="btn-ana" onclick="gachaKapat()">ENVANTERE EKLE</button>
        </div>
    </div>

    <div id="liderlik-ekrani" class="modal">
        <h2 style="color:var(--vurgu-renk)">🏆 EN İYİ AVCILAR</h2>
        <div id="liderlik-listesi" style="width:100%; max-width:400px; margin-bottom:20px;"></div>
        <button class="btn-ana" onclick="document.getElementById('liderlik-ekrani').style.display='none'">KAPAT</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, getDocs, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCzCI_RU9eE-MIeR-2jcwaLRz74hmRqnuQ",
            authDomain: "gameoftame-7c63f.firebaseapp.com",
            projectId: "gameoftame-7c63f",
            storageBucket: "gameoftame-7c63f.firebasestorage.app",
            messagingSenderId: "829948418870",
            appId: "1:829948418870:web:02373ec1d4b170049fb197"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tasiyiciRef = doc(db, "gameState", "carrier");
        
        let oyuncuID = localStorage.getItem("oyuncuID");
        let oyuncuEnvanteri = [];
        let canavarHavuzu = { yaygın: [], nadir: [], destansı: [], efsanevi: [], mitik: [] };
        const nadirlikPuanlari = { "yaygın": 2, "nadir": 5, "destansı": 10, "efsanevi": 20, "mitik": 50 };

        // --- GİRİŞ VE SİSTEM BAŞLATMA ---
        window.girisYap = async function() {
            const isim = document.getElementById("kullanici-adi").value.trim().toLowerCase();
            if (!isim) return;
            const id = "p_" + isim;
            const snap = await getDoc(doc(db, "players", id));
            if (!snap.exists()) {
                await setDoc(doc(db, "players", id), { isim: isim, envanter: [], sonKullanilanDongu: 0 });
            }
            localStorage.setItem("oyuncuID", id);
            location.reload();
        }

        if (oyuncuID) {
            document.getElementById("giris-ekrani").style.display = "none";
            startListener();
            canavarlariYukle();
        }

        async function canavarlariYukle() {
            const snap = await getDocs(collection(db, "canavarlar"));
            snap.forEach(d => {
                const c = d.data();
                const n = (c.nadirlik || "yaygın").toLowerCase();
                if (canavarHavuzu[n]) canavarHavuzu[n].push(c);
            });
        }

        function startListener() {
            onSnapshot(doc(db, "players", oyuncuID), (doc) => {
                const data = doc.data();
                oyuncuEnvanteri = data.envanter || [];
                arayuzuGuncelle(data);
            });

            onSnapshot(tasiyiciRef, (doc) => {
                const data = doc.data();
                const kodYazisi = document.getElementById("kod-yazisi");
                const avciYazisi = document.getElementById("avci-yazisi");
                const baslik = document.getElementById("tasiyici-baslik");

                if (data.hedefOyuncuID === oyuncuID) {
                    baslik.innerText = "SİSTEM TAŞIYICISI SENSİN!";
                    kodYazisi.style.display = "block";
                    avciYazisi.style.display = "none";
                    document.getElementById("benim-kodum").innerText = data.aktifKod;
                } else {
                    baslik.innerText = "HEDEF TESPİT EDİLDİ";
                    kodYazisi.style.display = "none";
                    avciYazisi.style.display = "block";
                    document.getElementById("hedef-isim").innerText = data.hedefIsim.toUpperCase();
                }
            });
        }

        function arayuzuGuncelle(veri) {
            let toplamPuan = 0;
            oyuncuEnvanteri.forEach(c => toplamPuan += (nadirlikPuanlari[c.nadirlik.toLowerCase()] || 2));
            const level = Math.floor(toplamPuan / 50) + 1;

            document.getElementById("ust-isim").innerText = veri.isim.toUpperCase();
            document.getElementById("ust-skor").innerText = `Lv.${level} | ${toplamPuan} PUAN`;
            document.getElementById("sayac-text").innerText = `${oyuncuEnvanteri.length}/∞`;

            const izgara = document.getElementById("koleksiyon-onizleme");
            izgara.innerHTML = "";
            oyuncuEnvanteri.slice(-8).reverse().forEach(c => {
                izgara.innerHTML += `<div class="canavar-kutu" style="border-color:${c.renk}"><img src="${c.resim}"></div>`;
            });
        }

        // --- GACHA VE KOD ÇÖZME SİSTEMİ ---
        window.koduCozVeCevir = async function() {
            const girilenKod = document.getElementById("hedef-kod").value.trim().toUpperCase();
            const snap = await getDoc(tasiyiciRef);
            
            if (snap.exists() && snap.data().aktifKod === girilenKod && snap.data().durum === "aktif") {
                const tID = snap.data().zamanDamgasi; // Mevcut döngü kimliği
                const tasiyiciID = snap.data().hedefOyuncuID;

                const oSnap = await getDoc(doc(db, "players", oyuncuID));
                if (oSnap.data().sonKullanilanDongu === tID) {
                    alert("⛔ Bu taşıyıcının kodunu zaten kullandın! Yeni birini bekle.");
                    return;
                }

                document.getElementById("gacha-ekrani").style.display = "flex";
                document.getElementById("gacha-bekleme").style.display = "block";
                document.getElementById("gacha-sonuc").style.display = "none";

                // Şans Hesaplama
                const r = Math.random() * 100;
                let secilenHavuz = canavarHavuzu.yaygın;
                if (r < 2) secilenHavuz = canavarHavuzu.mitik;
                else if (r < 10) secilenHavuz = canavarHavuzu.efsanevi;
                else if (r < 25) secilenHavuz = canavarHavuzu.destansı;
                else if (r < 50) secilenHavuz = canavarHavuzu.nadir;

                const kazanilan = secilenHavuz[Math.floor(Math.random() * secilenHavuz.length)];

                setTimeout(async () => {
                    // Oyuncuya canavar ekle ve döngüyü işaretle
                    await updateDoc(doc(db, "players", oyuncuID), { 
                        envanter: arrayUnion(kazanilan),
                        sonKullanilanDongu: tID 
                    });

                    // TAŞIYICIYA ÖDÜL (Madde 8): Kodunu paylaştığı için ona da bir hediye gitmeli
                    if(tasiyiciID && tasiyiciID !== oyuncuID) {
                        const hediye = canavarHavuzu.yaygın[Math.floor(Math.random() * canavarHavuzu.yaygın.length)];
                        await updateDoc(doc(db, "players", tasiyiciID), { envanter: arrayUnion(hediye) });
                    }

                    // UI Güncelle
                    document.getElementById("gacha-bekleme").style.display = "none";
                    document.getElementById("gacha-sonuc").style.display = "block";
                    document.getElementById("yeni-canavar-img").src = kazanilan.resim;
                    document.getElementById("yeni-canavar-isim").innerText = kazanilan.isim;
                    document.getElementById("yeni-canavar-nadir").innerText = kazanilan.nadirlik.toUpperCase();
                    document.getElementById("yeni-canavar-nadir").style.background = kazanilan.renk || "#444";
                }, 2000);
            } else { alert("GEÇERSİZ KOD!"); }
        }

        window.liderlikAc = async function() {
            const listEkrani = document.getElementById("liderlik-ekrani");
            const liste = document.getElementById("liderlik-listesi");
            listEkrani.style.display = "flex";
            liste.innerHTML = "Yükleniyor...";

            const snap = await getDocs(collection(db, "players"));
            let siralama = [];
            snap.forEach(d => {
                const data = d.data();
                let p = 0;
                (data.envanter || []).forEach(c => p += (nadirlikPuanlari[c.nadirlik.toLowerCase()] || 2));
                siralama.push({ isim: data.isim, puan: p, lv: Math.floor(p/50)+1 });
            });

            siralama.sort((a,b) => b.puan - a.puan);
            liste.innerHTML = "";
            siralama.slice(0,10).forEach((o, i) => {
                liste.innerHTML += `
                    <div class="sira-satir">
                        <span>#${i+1} ${o.isim.toUpperCase()} <small>[Lv.${o.lv}]</small></span>
                        <span style="color:var(--vurgu-renk)">${o.puan} P</span>
                    </div>`;
            });
        }

        window.gachaKapat = () => document.getElementById("gacha-ekrani").style.display = "none";
    </script>
</body>
</html>
