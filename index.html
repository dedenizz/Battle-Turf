<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürü - Ana Üs</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arka-plan: #0f1015;
            --panel: #1a1c23;
            --vurgu-renk: #00ffcc;
            --kirmizi-alarm: #ff3366;
            --metin: #ffffff;
            --metin-soluk: #8a8d98;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; background-color: var(--arka-plan); color: var(--metin); 
            font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; 
            overflow: hidden;
        }

        /* --- GİRİŞ EKRANI --- */
        #giris-ekrani {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--arka-plan); z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .giris-kutu { background: var(--panel); padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #2a2c35; }
        .input-text { width: 100%; padding: 15px; margin: 20px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; font-size: 1.2rem; text-align: center; outline: none; font-family: 'Roboto Mono', monospace; text-transform: lowercase; }
        .input-text:focus { border-color: var(--vurgu-renk); }
        .btn { background: var(--metin); color: #000; border: none; padding: 15px 30px; font-size: 1.1rem; font-weight: 900; border-radius: 10px; cursor: pointer; width: 100%; transition: 0.2s; text-transform: uppercase; }
        .btn:hover { background: var(--vurgu-renk); transform: scale(0.98); }

        /* --- ÜST BİLGİ ÇUBUĞU --- */
        .ust-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: var(--panel); border-bottom: 1px solid #2a2c35; }
        .oyuncu-isim { font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        .oyuncu-rutbe { font-size: 0.8rem; color: var(--vurgu-renk); text-transform: uppercase; letter-spacing: 2px; }

        /* --- ANA iPAD EKRANI --- */
        .ana-ekran { display: flex; flex: 1; height: calc(100vh - 80px); }
        
        .sol-panel { flex: 1; padding: 30px; overflow-y: auto; border-right: 1px solid #2a2c35; }
        .baslik { font-size: 1.2rem; color: var(--metin-soluk); margin-bottom: 20px; font-weight: 700; letter-spacing: 1px; }
        
        .koleksiyon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .canavar-kart { background: #111; border: 1px solid #333; border-radius: 15px; padding: 15px; text-align: center; position: relative; }
        .canavar-resim { width: 100px; height: 100px; background: #222; border-radius: 10px; margin: 0 auto 10px auto; display: flex; justify-content: center; align-items: center; color: #555; font-size: 2rem; border: 1px dashed #444;}
        .canavar-isim { font-weight: 700; font-size: 0.9rem; margin-bottom: 5px; }
        .nadir-etiket { font-size: 0.7rem; font-weight: 900; padding: 3px 8px; border-radius: 5px; background: #333; display: inline-block; }
        
        .sag-panel { width: 400px; background: #14151b; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; position: relative; }
        .radar-uyari { color: var(--kirmizi-alarm); font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 40px; text-align: center; animation: yanipSonme 2s infinite; }
        @keyframes yanipSonme { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .kod-kutusu { background: #000; border: 2px solid #333; border-radius: 15px; padding: 30px; text-align: center; width: 100%; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .kod-input { background: transparent; border: none; color: #fff; font-size: 4rem; width: 100%; text-align: center; font-family: 'Roboto Mono', monospace; outline: none; letter-spacing: 10px; margin-bottom: 20px;}
        .kod-input::placeholder { color: #333; }
        
        .btn-cevir { background: var(--kirmizi-alarm); color: #fff; padding: 20px; font-size: 1.3rem; border-radius: 10px; width: 100%; font-weight: 900; letter-spacing: 2px; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 20px rgba(255, 51, 102, 0.2); }
        .btn-cevir:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255, 51, 102, 0.4); }

        /* --- GACHA EKRANI --- */
        #gacha-ekrani {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            z-index: 200; display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .gacha-kapsul { width: 200px; height: 200px; background: #222; border-radius: 50%; border: 5px solid var(--vurgu-renk); box-shadow: 0 0 50px rgba(0, 255, 204, 0.5); display: flex; justify-content: center; align-items: center; font-size: 5rem; animation: titreme 2s ease-in-out infinite; }
        @keyframes titreme { 0% { transform: scale(1) rotate(0deg); } 25% { transform: scale(1.1) rotate(-5deg); } 50% { transform: scale(1.1) rotate(5deg); } 75% { transform: scale(1.1) rotate(-5deg); } 100% { transform: scale(1) rotate(0deg); } }
        
        .gacha-sonuc { display: none; text-align: center; animation: dropIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes dropIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .yeni-resim { width: 200px; height: 200px; background: #fff; border-radius: 20px; margin-bottom: 20px; }
        
    </style>
</head>
<body>

<div id="giris-ekrani">
        <div class="giris-kutu">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">PROJE: SÜRÜ</h1>
            <p style="color: var(--metin-soluk);">Sisteme bağlanmak için adını ve şifreni gir.</p>
            
            <input type="text" id="kullanici-adi" class="input-text" placeholder="İSİM" maxlength="12">
            <input type="password" id="kullanici-pin" class="input-text" placeholder="4 HANELİ PİN" maxlength="4" style="margin-top: 0; text-transform: none; letter-spacing: 5px;">
            
            <button class="btn" onclick="hesapOlustur()">BAĞLAN</button>
            <p id="giris-durum" style="margin-top: 15px; color: var(--kirmizi-alarm); font-weight: bold;"></p>
        </div>
    </div>

    <div id="ana-uygulama" style="display: none; height: 100%; flex-direction: column;">
        <div class="ust-bar">
            <div>
                <div class="oyuncu-isim" id="ekran-isim">AVCI</div>
                <div class="oyuncu-rutbe">Seviye 1 Avcı</div>
            </div>
            <div style="font-family: 'Roboto Mono', monospace; font-size: 1.2rem; color: var(--vurgu-renk);">
                KAPASİTE: <span id="koleksiyon-sayisi">0</span>/50
            </div>
        </div>

        <div class="ana-ekran">
            <div class="sol-panel">
                <div class="baslik">KOLEKSİYONUN</div>
                <div class="koleksiyon-grid" id="envanter-listesi">
                    </div>
            </div>

            <div class="sag-panel">
                <div class="radar-uyari">⚠ YAKINLARDA BİR TAŞIYICI TESPİT EDİLDİ</div>
                <div class="kod-kutusu">
                    <p style="color: #666; font-weight: bold; margin-top: 0;">TAŞIYICI KODUNU GİR</p>
                    <input type="number" id="hedef-kod" class="kod-input" placeholder="----" maxlength="4">
                    <button class="btn-cevir" onclick="koduCozVeCevir()">KODU ÇÖZ & ÇEVİR</button>
                </div>
                <button onclick="cikisYap()" style="margin-top: 20px; background: transparent; color: #555; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Sistemden Çık</button>
            </div>
        </div>
    </div>

    <div id="gacha-ekrani">
        <div id="gacha-bekleme" class="gacha-kapsul">?</div>
        <div id="gacha-sonuc" class="gacha-sonuc">
            <h2 style="color: var(--vurgu-renk); letter-spacing: 5px; margin-bottom: 20px;">VERİ ÇEKİLDİ!</h2>
            <div class="yeni-resim">
                <div id="yeni-canavar-placeholder" style="width:100%; height:100%; display:flex; justify-content:center; align-items:center; color:#000; font-size:4rem; background:#fff; border-radius:20px;">✨</div>
            </div>
            <h1 id="yeni-canavar-isim" style="font-size: 2.5rem; margin-bottom: 10px;">---</h1>
            <p id="yeni-canavar-nadir" style="color: var(--metin-soluk); font-size: 1.2rem; text-transform: uppercase;">---</p>
            <br>
            <button class="btn" style="width: 250px; background: var(--vurgu-renk);" onclick="gachaKapat()">KABUL ET</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, getDocs, query, where, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCzCI_RU9eE-MIeR-2jcwaLRz74hmRqnuQ",
          authDomain: "gameoftame-7c63f.firebaseapp.com",
          projectId: "gameoftame-7c63f",
          storageBucket: "gameoftame-7c63f.firebasestorage.app",
          messagingSenderId: "829948418870",
          appId: "1:829948418870:web:02373ec1d4b170049fb197"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Canavar Havuzu (Gacha için)
        const canavarHavuzu = [
            { isim: "Kül Kurdu", nadirlik: "Yaygın", renk: "#aaa" },
            { isim: "Gölge Sürüngeni", nadirlik: "Yaygın", renk: "#aaa" },
            { isim: "Neon Pençe", nadirlik: "Nadir", renk: "#0088ff" },
            { isim: "Kristal Zırhlı", nadirlik: "Destansı", renk: "#aa00ff" },
            { isim: "Hiçlik Ejderi", nadirlik: "Efsanevi", renk: "#ffaa00" }
        ];

        let oyuncuEnvanteri = []; // Bellek
// --- 1. GERÇEK KİMLİK DOĞRULAMA (PİN KORUMALI) ---
        window.hesapOlustur = async function() {
            const kullaniciAdi = document.getElementById("kullanici-adi").value.trim().toLowerCase();
            const pin = document.getElementById("kullanici-pin").value.trim();
            const durum = document.getElementById("giris-durum");

            if (kullaniciAdi.length < 3) {
                durum.innerText = "İsim en az 3 harf olmalı."; return;
            }
            if (pin.length !== 4 || isNaN(pin)) {
                durum.innerText = "PIN 4 haneli bir sayı olmalıdır."; return;
            }

            durum.style.color = "#8a8d98";
            durum.innerText = "Veritabanı taranıyor...";

            try {
                const playersRef = collection(db, "players");
                const q = query(playersRef, where("isim", "==", kullaniciAdi));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    // HESAP VAR - PIN KONTROLÜ YAP
                    const playerData = querySnapshot.docs[0];
                    const dbPin = playerData.data().pin; // Veritabanındaki PIN'i çek

                    if (dbPin === pin) {
                        // Şifre Doğru!
                        localStorage.setItem("oyuncuID", playerData.id);
                        localStorage.setItem("oyuncuIsim", playerData.data().isim);
                        durum.style.color = "#00ffcc";
                        durum.innerText = "Şifre doğru. Giriş yapılıyor...";
                        setTimeout(() => { sistemiBaslat(); }, 1000);
                    } else {
                        // Şifre Yanlış! Girişi Reddet.
                        durum.style.color = "#ff3366";
                        durum.innerText = "Hatalı PIN!";
                    }
                } else {
                    // HESAP YOK - YENİ OLUŞTUR VE PIN'İ KAYDET
                    durum.innerText = "Yeni hesap oluşturuluyor...";
                    const docRef = await addDoc(collection(db, "players"), {
                        isim: kullaniciAdi,
                        pin: pin, // Oyuncunun belirlediği PIN'i veritabanına kaydet
                        seviye: 1,
                        kapasite: 50,
                        envanter: [ { isim: "Başlangıç Çekirdeği", nadirlik: "Yaygın", renk: "#aaa" } ]
                    });
                    localStorage.setItem("oyuncuID", docRef.id);
                    localStorage.setItem("oyuncuIsim", kullaniciAdi);
                    durum.style.color = "#00ffcc";
                    durum.innerText = "Kayıt başarılı. Yönlendiriliyor...";
                    setTimeout(() => { sistemiBaslat(); }, 1000);
                }
            } catch (e) {
                console.error(e);
                durum.style.color = "#ff3366";
                durum.innerText = "Sunucu bağlantı hatası!";
            }
        };

        // --- 2. SİSTEMİ BAŞLAT (VERİ ÇEK) ---
        window.sistemiBaslat = async function() {
            const id = localStorage.getItem("oyuncuID");
            const isim = localStorage.getItem("oyuncuIsim");
            
            if (id) {
                document.getElementById("giris-ekrani").style.display = "none";
                document.getElementById("ana-uygulama").style.display = "flex";
                document.getElementById("ekran-isim").innerText = isim;

                try {
                    const oyuncuVerisi = await getDoc(doc(db, "players", id));
                    if (oyuncuVerisi.exists()) {
                        oyuncuEnvanteri = oyuncuVerisi.data().envanter || [];
                        arayuzuGuncelle();
                    } else {
                        cikisYap();
                    }
                } catch (e) {
                    console.error("Veri çekilemedi:", e);
                }
            }
        };

        // Arayüzü Çiz
        function arayuzuGuncelle() {
            const grid = document.getElementById("envanter-listesi");
            document.getElementById("koleksiyon-sayisi").innerText = oyuncuEnvanteri.length;
            grid.innerHTML = ""; 

            oyuncuEnvanteri.forEach(canavar => {
                const kart = document.createElement("div");
                kart.className = "canavar-kart";
                kart.innerHTML = `
                    <div class="canavar-resim">?</div>
                    <div class="canavar-isim">${canavar.isim}</div>
                    <div class="nadir-etiket" style="color: ${canavar.renk}; border: 1px solid ${canavar.renk}">${canavar.nadirlik}</div>
                `;
                grid.appendChild(kart);
            });
        }

        // --- 3. GACHA (KUTU AÇILIMI) ---
        window.koduCozVeCevir = async function() {
            const kod = document.getElementById("hedef-kod").value;
            if (kod.length !== 4) { alert("Hata: Kod 4 haneli olmalıdır."); return; }

            document.getElementById("hedef-kod").value = "";
            document.getElementById("gacha-ekrani").style.display = "flex";
            document.getElementById("gacha-bekleme").style.display = "flex";
            document.getElementById("gacha-sonuc").style.display = "none";

            const rastgeleSayi = Math.random();
            let kazanilanCanavar;
            
            if (rastgeleSayi > 0.95) kazanilanCanavar = canavarHavuzu[4];
            else if (rastgeleSayi > 0.80) kazanilanCanavar = canavarHavuzu[3];
            else if (rastgeleSayi > 0.50) kazanilanCanavar = canavarHavuzu[2];
            else kazanilanCanavar = canavarHavuzu[Math.floor(Math.random() * 2)];

            setTimeout(async () => {
                const id = localStorage.getItem("oyuncuID");
                await updateDoc(doc(db, "players", id), {
                    envanter: arrayUnion(kazanilanCanavar)
                });
                
                oyuncuEnvanteri.push(kazanilanCanavar);
                arayuzuGuncelle();

                document.getElementById("gacha-bekleme").style.display = "none";
                document.getElementById("gacha-sonuc").style.display = "block";
                
                document.getElementById("yeni-canavar-isim").innerText = kazanilanCanavar.isim;
                document.getElementById("yeni-canavar-isim").style.color = kazanilanCanavar.renk;
                document.getElementById("yeni-canavar-nadir").innerText = kazanilanCanavar.nadirlik;

            }, 3000); 
        };

        window.gachaKapat = function() {
            document.getElementById("gacha-ekrani").style.display = "none";
        };

        window.cikisYap = function() {
            localStorage.clear();
            location.reload();
        };

        sistemiBaslat();
    </script>
</body>
</html>
