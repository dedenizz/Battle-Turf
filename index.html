<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game of Tame - Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: rgba(30, 32, 40, 0.85);
            --accent-gold: #f3c669;
            --accent-purple: #9d4edd;
            --text-light: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-light); 
            font-family: 'Lato', sans-serif; height: 100vh; display: flex; flex-direction: column; 
            overflow: hidden; 
            /* A clean, magical dark background */
            background-image: radial-gradient(circle at top, #240b36 0%, #000000 100%);
        }

        h1, h2, h3 { font-family: 'Cinzel', serif; margin: 0; font-weight: 800; letter-spacing: 2px; }

        /* Login Overlay */
        #login-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px; text-align: center;
        }
        .login-box { background: var(--panel-bg); padding: 40px 20px; border-radius: 15px; border: 1px solid var(--accent-purple); width: 100%; max-width: 350px; box-shadow: 0 10px 30px rgba(157, 78, 221, 0.2); }
        .input-field { width: 100%; padding: 15px; margin: 20px 0; background: rgba(0,0,0,0.5); border: 1px solid #555; color: #fff; border-radius: 8px; font-size: 1.1rem; text-align: center; outline: none; }
        .input-field:focus { border-color: var(--accent-gold); }

        /* Top Bar */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center; padding: 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); z-index: 10;
        }
        .user-info .name { font-size: 1.3rem; font-family: 'Cinzel', serif; color: var(--accent-gold); text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .user-info .title { font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .currency { font-size: 1.1rem; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 5px; }
        .currency::before { content: '✦'; color: var(--accent-gold); }

        /* App Screens */
        .view-container { flex: 1; overflow-y: auto; padding: 0 20px 100px 20px; }
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* The Hunt (Radar Replacement) */
        .hunt-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; margin-top: 30px; }
        .magic-circle {
            width: 280px; height: 280px; border-radius: 50%; border: 1px solid rgba(157, 78, 221, 0.3);
            display: flex; justify-content: center; align-items: center; position: relative;
            box-shadow: inset 0 0 50px rgba(157, 78, 221, 0.1);
        }
        .magic-circle::before {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 2px dashed var(--accent-gold); opacity: 0.5; animation: spinRotate 15s linear infinite;
        }
        @keyframes spinRotate { 100% { transform: rotate(360deg); } }

        .target-input {
            background: rgba(0,0,0,0.6); border: 2px solid var(--accent-purple); color: #fff; font-size: 2.5rem;
            text-align: center; padding: 15px; width: 200px; border-radius: 12px; margin-top: 40px;
            letter-spacing: 8px; outline: none; transition: 0.3s;
        }
        .target-input:focus { box-shadow: 0 0 20px rgba(157, 78, 221, 0.5); }

        /* Buttons */
        .btn {
            background: linear-gradient(45deg, #7b2cbf, #9d4edd); color: #fff; border: none; padding: 15px 40px;
            font-size: 1.1rem; font-family: 'Cinzel', serif; font-weight: bold; border-radius: 30px; margin-top: 20px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(157, 78, 221, 0.4); transition: 0.2s; width: 100%;
        }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn:active { transform: translateY(1px); }

        /* The Collection (Inventory) */
        .collection-header { text-align: center; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .beast-card {
            background: var(--panel-bg); border: 1px solid #333; border-radius: 12px; padding: 15px;
            text-align: center; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .beast-card.epic { border-color: var(--accent-purple); box-shadow: 0 0 15px rgba(157, 78, 221, 0.2); }
        .beast-card.legendary { border-color: var(--accent-gold); box-shadow: 0 0 15px rgba(243, 198, 105, 0.2); }

        .image-frame {
            width: 90px; height: 90px; margin: 0 auto 10px auto; border-radius: 8px;
            background: #111; border: 2px solid #444; display: flex; justify-content: center; align-items: center;
        }
        .epic .image-frame { border-color: var(--accent-purple); }
        .legendary .image-frame { border-color: var(--accent-gold); }

        /* Navigation */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: var(--panel-bg); backdrop-filter: blur(10px); border-top: 1px solid #333;
            display: flex; justify-content: space-around; align-items: center; z-index: 20;
        }
        .nav-item {
            color: #888; font-family: 'Cinzel', serif; font-size: 1rem; text-align: center;
            flex: 1; padding: 15px 0; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .nav-item.active { color: var(--accent-gold); text-shadow: 0 0 10px rgba(243, 198, 105, 0.4); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--accent-gold);">GAME OF TAME</h2>
            <p style="color: #aaa; margin-bottom: 30px;">Enter your Tamer Name to begin.</p>
            <input type="text" id="username-input" class="input-field" placeholder="Username" maxlength="12">
            <button class="btn" onclick="createAccount()">ENTER ARENA</button>
            <p id="login-status" style="margin-top: 15px; font-size: 0.9rem; color: #ff4444;"></p>
        </div>
    </div>

    <div id="main-ui" style="display: none; height: 100%; flex-direction: column;">
        <div class="top-bar">
            <div class="user-info">
                <div class="name" id="display-name">TAMER</div>
                <div class="title">Novice Hunter</div>
            </div>
            <div class="currency" id="display-coins">0</div>
        </div>

        <div class="view-container">
            
            <div id="view-hunt" class="view active">
                <div class="hunt-container">
                    <div class="magic-circle">
                        <h3 style="color: #666; font-family: 'Lato', sans-serif;">SEEKING TARGET...</h3>
                    </div>
                    
                    <input type="number" id="targetCode" class="target-input" placeholder="0000" maxlength="4">
                    <button class="btn" style="width: 200px;" onclick="initiateHunt()">ENGAGE</button>
                </div>
            </div>

            <div id="view-collection" class="view">
                <div class="collection-header">
                    <h2>YOUR BEASTS</h2>
                </div>
                
                <div class="grid" id="inventory-grid">
                    <div class="beast-card">
                        <div class="image-frame"><span style="color: #555;">No Art</span></div>
                        <h4 style="margin: 0; font-family: 'Cinzel', serif;">Starter Beast</h4>
                        <p style="margin: 5px 0 0 0; font-size: 0.8rem; color: #888;">Common</p>
                    </div>
                </div>
            </div>

        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchView('hunt', this)">THE HUNT</div>
            <div class="nav-item" onclick="switchView('collection', this)">COLLECTION</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Your exact Firebase keys
        const firebaseConfig = {
          apiKey: "AIzaSyCzCI_RU9eE-MIeR-2jcwaLRz74hmRqnuQ",
          authDomain: "gameoftame-7c63f.firebaseapp.com",
          projectId: "gameoftame-7c63f",
          storageBucket: "gameoftame-7c63f.firebasestorage.app",
          messagingSenderId: "829948418870",
          appId: "1:829948418870:web:02373ec1d4b170049fb197"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Account Creation / Login
        window.createAccount = async function() {
            const username = document.getElementById("username-input").value.trim();
            const statusText = document.getElementById("login-status");

            if (username.length < 3) {
                statusText.innerText = "Name must be at least 3 letters.";
                return;
            }

            statusText.style.color = "#aaa";
            statusText.innerText = "Connecting to server...";

            try {
                // Actually creates the player in your database
                const docRef = await addDoc(collection(db, "players"), {
                    username: username,
                    coins: 500, // Starting money
                    inventory: ["Starter Beast"]
                });
                
                // Save login state to iPad/Phone
                localStorage.setItem("playerID", docRef.id);
                localStorage.setItem("playerName", username);
                
                checkLoginState();
            } catch (e) {
                console.error(e);
                statusText.style.color = "#ff4444";
                statusText.innerText = "Error connecting to database.";
            }
        };

        // Boot Up Sequence
        function checkLoginState() {
            const savedID = localStorage.getItem("playerID");
            const savedName = localStorage.getItem("playerName");
            
            if (savedID) {
                // Hide Login, Show Game
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-ui").style.display = "flex";
                
                // Load Player Data
                document.getElementById("display-name").innerText = savedName;
                document.getElementById("display-coins").innerText = "500"; // We will make this pull live data next
            }
        }

        // UI Navigation
        window.switchView = function(viewName, element) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + viewName).classList.add('active');
            element.classList.add('active');
        }

        // Jump to Battle
        window.initiateHunt = function() {
            const code = document.getElementById('targetCode').value;
            if (code.length > 0) {
                window.location.href = 'battle.html';
            } else {
                alert("Enter a Target Code to Engage!");
            }
        }

        // Run check on start
        checkLoginState();
    </script>
</body>
</html>
