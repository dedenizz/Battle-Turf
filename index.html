<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürü - Ana Üs</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arka-plan: #0f1015; --panel: #1a1c23; --vurgu-renk: #00ffcc;
            --kirmizi-alarm: #ff3366; --metin: #ffffff; --metin-soluk: #8a8d98; --altin: #ffd700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: var(--arka-plan); color: var(--metin); font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #giris-ekrani { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--arka-plan); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .logo-alan { text-align: center; margin-bottom: 40px; }
        .logo-suru { font-size: 4rem; font-weight: 900; letter-spacing: -2px; color: var(--vurgu-renk); text-shadow: 0 0 20px rgba(0,255,204,0.3); }
        .logo-alt { font-family: 'Roboto Mono', monospace; font-size: 0.9rem; color: var(--metin-soluk); }

        .giris-form { background: var(--panel); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.05); }
        input { width: 100%; background: #252833; border: 2px solid transparent; padding: 15px; border-radius: 12px; color: white; font-size: 1rem; margin-bottom: 15px; transition: 0.3s; }
        input:focus { border-color: var(--vurgu-renk); outline: none; background: #2a2e3b; }
        
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-ana { background: var(--vurgu-renk); color: #000; }
        .btn-ana:active { transform: scale(0.98); }

        /* Oyun Paneli */
        #oyun-paneli { display: none; flex-direction: column; height: 100%; }
        .ust-bar { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(26,28,35,0.8); backdrop-filter: blur(10px); }
        .oyuncu-bilgi h2 { margin: 0; font-size: 1.2rem; }
        .puan-etiket { color: var(--altin); font-weight: 900; font-family: 'Roboto Mono', monospace; font-size: 1.1rem; }

        .ana-icerik { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .kod-giris-alani { background: var(--panel); padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .kod-input-buyuk { font-size: 2.5rem; letter-spacing: 15px; text-align: center; font-family: 'Roboto Mono', monospace; font-weight: 700; margin: 20px 0; color: var(--vurgu-renk); }

        .koleksiyon-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding-bottom: 30px; }
        .canavar-kart { background: var(--panel); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .kart-img { width: 100%; aspect-ratio: 1; border-radius: 12px; object-fit: cover; margin-bottom: 10px; }
        .kart-isim { font-size: 0.85rem; font-weight: 700; color: var(--metin); }
        .kart-nadir { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; padding: 4px 8px; border-radius: 6px; display: inline-block; margin-top: 5px; }

        /* Gacha Modal */
        #gacha-ekrani { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .gacha-kapsayici { text-align: center; animation: gachaGiris 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes gachaGiris { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .gacha-resim-cerceve { width: 250px; height: 250px; border: 4px solid var(--vurgu-renk); border-radius: 30px; padding: 10px; margin: 20px auto; background: #000; box-shadow: 0 0 50px rgba(0,255,204,0.2); }
        .gacha-resim { width: 100%; height: 100%; border-radius: 20px; object-fit: cover; }
        
        /* Liderlik Tablosu */
        #liderlik-ekrani { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--arka-plan); z-index: 150; display: none; flex-direction: column; padding: 20px; }
        .sira-liste { margin-top: 20px; flex: 1; overflow-y: auto; }
        .sira-satir { background: var(--panel); padding: 15px 20px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid transparent; }
        .sira-1 { border-left-color: #ffd700; background: linear-gradient(90deg, rgba(255,215,0,0.1), var(--panel)); }
        .sira-2 { border-left-color: #c0c0c0; }
        .sira-3 { border-left-color: #cd7f32; }
        .sira-isim { font-weight: 700; font-size: 1.1rem; }
        .sira-skor { font-family: 'Roboto Mono', monospace; color: var(--vurgu-renk); font-weight: 700; }
        
        .yukleniyor-spinner { width: 50px; height: 50px; border: 5px solid #252833; border-top-color: var(--vurgu-renk); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="giris-ekrani">
        <div class="logo-alan">
            <div class="logo-suru">SÜRÜ</div>
            <div class="logo-alt">SİNYALİ TAKİP ET // AVCI OL</div>
        </div>
        <div class="giris-form">
            <input type="text" id="oyuncu-adi" placeholder="Kod Adını Gir (Örn: Alpha-01)" maxlength="15">
            <button class="btn btn-ana" onclick="oyunaBasla()">SİSTEME BAĞLAN</button>
            <p id="hata-msj" style="color: var(--kirmizi-alarm); font-size: 0.8rem; margin-top: 15px; display: none; text-align: center;">Hata: İsim boş olamaz!</p>
        </div>
    </div>

    <div id="oyun-paneli">
        <div class="ust-bar">
            <div class="oyuncu-bilgi">
                <h2 id="ekran-isim">AVCI</h2>
                <div class="puan-etiket"><span id="ekran-puan">0</span> PUAN</div>
            </div>
            <button onclick="liderlikAc()" style="background:none; border:none; color:var(--vurgu-renk); font-size:1.5rem; cursor:pointer;">🏆</button>
        </div>

        <div class="ana-icerik">
            <div class="kod-giris-alani">
                <p style="font-size: 0.8rem; color: var(--metin-soluk); margin: 0;">YAKININDAKİ SİNYAL KODUNU GİR</p>
                <input type="text" id="kod-input" class="kod-input-buyuk" placeholder="0000" maxlength="4">
                <button class="btn btn-ana" onclick="koduGir()">SİNYALİ ÇÖZ</button>
            </div>

            <h3 style="margin: 20px 0 10px 5px; font-size: 0.9rem; letter-spacing: 2px;">ENVANTERİN</h3>
            <div id="koleksiyon" class="koleksiyon-grid">
                </div>
            
            <button class="btn" onclick="cikisYap()" style="background:#252833; color:var(--metin-soluk); font-size:0.8rem; margin-top: 20px;">SİSTEMDEN ÇIK</button>
        </div>
    </div>

    <div id="gacha-ekrani">
        <div id="gacha-bekleme" class="gacha-kapsayici">
            <div class="yukleniyor-spinner"></div>
            <h2 style="color: var(--vurgu-renk); font-family: 'Roboto Mono', monospace;">VERİ PAKETİ ÇÖZÜLÜYOR...</h2>
        </div>

        <div id="gacha-sonuc" class="gacha-kapsayici" style="display: none;">
            <h3 style="color: var(--metin-soluk); margin: 0;">YENİ BİR CANAVAR BULUNDU!</h3>
            <h1 id="gacha-baslik" style="font-size: 2.5rem; margin: 10px 0;">HARİKA!</h1>
            <div id="gacha-resim-cerceve" class="gacha-resim-cerceve">
                <img id="yeni-canavar-img" src="" class="gacha-resim">
            </div>
            <h2 id="yeni-canavar-isim" style="margin: 0; font-size: 1.8rem;">---</h2>
            <div id="yeni-canavar-nadir" class="kart-nadir">---</div>
            <button class="btn btn-ana" style="margin-top: 30px;" onclick="gachaKapat()">ENVANTERE EKLE</button>
        </div>
    </div>

    <div id="liderlik-ekrani">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1 style="margin: 0; font-size: 1.5rem;">GLOBAL SIRALAMA</h1>
            <button onclick="document.getElementById('liderlik-ekrani').style.display='none'" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button>
        </div>
        <div id="liderlik-listesi" class="sira-liste">
            </div>
    </div>

    <script type="module" src="app.js"></script>

    <script type="module">
        import { doc, getDoc, setDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // APP.JS'den gelecek olan DB referansını bekliyoruz.
        // window.db atanmış olmalı.
        
        let oyuncu = { isim: "", puan: 0, envanter: [], id: "" };
        const nadirlikPuanlari = { "yaygın": 2, "nadir": 5, "destansı": 15, "efsanevi": 50 };

        // --- DERS PROGRAMI ZAMAN KONTROLÜ ---
        function zamanDurumuKontrol() {
            const simdi = new Date();
            const toplamDakika = (simdi.getHours() * 60) + simdi.getMinutes();

            const zamanCizelgesi = [
                { bas: 540, bit: 580, tur: "ders", ad: "1. Ders" },       // 09:00 - 09:40
                { bas: 580, bit: 590, tur: "teneffus", ad: "Teneffüs" },  // 09:40 - 09:50
                { bas: 590, bit: 630, tur: "ders", ad: "2. Ders" },
                { bas: 630, bit: 640, tur: "teneffus", ad: "Teneffüs" },
                { bas: 640, bit: 680, tur: "ders", ad: "3. Ders" },
                { bas: 680, bit: 690, tur: "teneffus", ad: "Teneffüs" },
                { bas: 690, bit: 730, tur: "ders", ad: "4. Ders" },
                { bas: 730, bit: 770, tur: "teneffus", ad: "Öğle Arası" },
                { bas: 770, bit: 810, tur: "ders", ad: "5. Ders" },
                { bas: 810, bit: 820, tur: "teneffus", ad: "Teneffüs" },
                { bas: 820, bit: 860, tur: "ders", ad: "6. Ders" },
                { bas: 860, bit: 870, tur: "teneffus", ad: "Teneffüs" },
                { bas: 870, bit: 910, tur: "ders", ad: "7. Ders" },
                { bas: 910, bit: 920, tur: "teneffus", ad: "Teneffüs" },
                { bas: 920, bit: 960, tur: "ders", ad: "8. Ders" }
            ];

            let durum = { tur: "ders", ad: "Ders Dışı/Okul Kapalı" }; 
            for (let z of zamanCizelgesi) {
                if (toplamDakika >= z.bas && toplamDakika < z.bit) {
                    durum = z; break;
                }
            }
            return durum;
        }

        window.oyunaBasla = async function() {
            const isim = document.getElementById("oyuncu-adi").value.trim();
            if (!isim) { document.getElementById("hata-msj").style.display = "block"; return; }
            
            oyuncu.isim = isim;
            oyuncu.id = "p-" + isim.toLowerCase().replace(/\s/g, "-");
            
            try {
                const userRef = doc(window.db, "players", oyuncu.id);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    oyuncu = userSnap.data();
                    oyuncu.id = userSnap.id;
                } else {
                    await setDoc(userRef, { isim: isim, puan: 0, envanter: [], seviye: 1 });
                    oyuncu = { isim: isim, puan: 0, envanter: [], id: userRef.id };
                }

                document.getElementById("giris-ekrani").style.display = "none";
                document.getElementById("oyun-paneli").style.display = "flex";
                arayuzuGuncelle();
            } catch (e) { console.error(e); alert("Bağlantı hatası! Lütfen internetinizi kontrol edin."); }
        };

        window.koduGir = async function() {
            const girilenKod = document.getElementById("kod-input").value.trim();
            if (girilenKod.length !== 4) return alert("Kod 4 haneli olmalı!");

            // 🔥 ZAMAN KONTROLÜ
            const durum = zamanDurumuKontrol();
            if (durum.tur === "ders") {
                alert(`Sinyal Kesildi! Şu an ${durum.ad} vaktindeyiz. Avlanmak için teneffüsü beklemelisin.`);
                return;
            }

            try {
                // Taşıyıcı kontrolü
                const gameSnap = await getDoc(doc(window.db, "gameState", "carrier"));
                const gameData = gameSnap.data();

                if (gameData && gameData.aktifKod === girilenKod && gameData.durum === "aktif") {
                    document.getElementById("gacha-ekrani").style.display = "flex";
                    document.getElementById("gacha-bekleme").style.display = "block";
                    document.getElementById("gacha-sonuc").style.display = "none";

                    // Canavarları çek (canavarlar koleksiyonundan rastgele bir tane)
                    const monstersSnap = await getDocs(collection(window.db, "canavarlar"));
                    const allMonsters = monstersSnap.docs.map(d => d.data());
                    const secilen = allMonsters[Math.floor(Math.random() * allMonsters.length)];

                    // Firebase Güncelle
                    oyuncu.envanter.push(secilen);
                    let yeniPuan = 0;
                    oyuncu.envanter.forEach(c => yeniPuan += (nadirlikPuanlari[c.nadirlik.toLowerCase()] || 2));
                    oyuncu.puan = yeniPuan;

                    await updateDoc(doc(window.db, "players", oyuncu.id), {
                        envanter: oyuncu.envanter,
                        puan: oyuncu.puan
                    });

                    // Taşıyıcıyı sıfırla (kod kullanıldı)
                    await updateDoc(doc(window.db, "gameState", "carrier"), { durum: "kullanildi" });

                    // UI GÖSTERİMİ
                    setTimeout(() => {
                        document.getElementById("gacha-bekleme").style.display = "none";
                        document.getElementById("gacha-sonuc").style.display = "block";
                        document.getElementById("yeni-canavar-img").src = secilen.resim;
                        document.getElementById("yeni-canavar-isim").innerText = secilen.isim.replace(/_/g, " ");
                        document.getElementById("yeni-canavar-nadir").innerText = secilen.nadirlik.toUpperCase();
                        
                        const renk = secilen.nadirlik.toLowerCase() === "destansı" ? "#ff3366" : "#00ffcc";
                        document.getElementById("gacha-resim-cerceve").style.borderColor = renk;
                        document.getElementById("yeni-canavar-nadir").style.background = renk;
                        arayuzuGuncelle();
                    }, 2000);

                } else { alert("GEÇERSİZ VEYA SÜRESİ DOLMUŞ KOD!"); }
            } catch (e) { console.error(e); alert("Kod doğrulanamadı."); }
        };

        function arayuzuGuncelle() {
            document.getElementById("ekran-isim").innerText = oyuncu.isim.toUpperCase();
            document.getElementById("ekran-puan").innerText = oyuncu.puan;
            const kol = document.getElementById("koleksiyon");
            kol.innerHTML = "";
            oyuncu.envanter.reverse().forEach(c => {
                const renk = c.nadirlik.toLowerCase() === "destansı" ? "#ff3366" : "#00ffcc";
                kol.innerHTML += `
                    <div class="canavar-kart">
                        <img src="${c.resim}" class="kart-img">
                        <div class="kart-isim">${c.isim.replace(/_/g, " ")}</div>
                        <div class="kart-nadir" style="background:${renk}">${c.nadirlik}</div>
                    </div>
                `;
            });
        }

        window.liderlikAc = async function() {
            document.getElementById("liderlik-ekrani").style.display = "flex";
            const liste = document.getElementById("liderlik-listesi");
            liste.innerHTML = "<div class='yukleniyor-spinner'></div>";
            
            try {
                const snap = await getDocs(collection(window.db, "players"));
                let oyuncular = [];
                snap.forEach(d => {
                    const data = d.data();
                    if(data.isim) oyuncular.push(data);
                });
                
                oyuncular.sort((a, b) => b.puan - a.puan);
                liste.innerHTML = "";
                oyuncular.slice(0, 10).forEach((o, i) => {
                    const siraSinifi = i === 0 ? "sira-1" : i === 1 ? "sira-2" : i === 2 ? "sira-3" : "";
                    liste.innerHTML += `
                        <div class="sira-satir ${siraSinifi}">
                            <div class="sira-isim">#${i+1} ${o.isim}</div>
                            <div class="sira-skor">${o.puan} Puan</div>
                        </div>
                    `;
                });
            } catch (e) { liste.innerHTML = "Veriler yüklenemedi."; }
        };

        window.gachaKapat = () => document.getElementById("gacha-ekrani").style.display = "none";
        window.cikisYap = () => { localStorage.removeItem("oyuncu"); location.reload(); };
    </script>
</body>
</html>
