<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÜRÜ: Taşıyıcı Uyanışı</title>
    <style>
        :root { --neon-cyan: #00ffcc; --rarity-common: #a0a0a0; --rarity-rare: #0088ff; --rarity-epic: #aa00ff; --rarity-legendary: #ffaa00; --rarity-mythic: #ff3366; }
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow-x: hidden; }
        
        /* GİRİŞ EKRANI */
        #giris-ekrani { position: fixed; inset: 0; background: radial-gradient(circle, #111, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .input-box { background: #1a1a1a; border: 2px solid var(--neon-cyan); padding: 20px; border-radius: 15px; text-align: center; }
        input { background: #000; border: 1px solid #444; color: white; padding: 10px; margin: 10px; border-radius: 5px; width: 200px; text-align: center; }
        button { background: var(--neon-cyan); color: black; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--neon-cyan); }

        /* ANA OYUN ALANI */
        #oyun-ekrani { display: none; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* GACHA BÖLÜMÜ */
        .gacha-area { background: #111; border: 2px dashed #333; padding: 40px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
        #gacha-bekleme { display: none; font-size: 2rem; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        #gacha-sonuc { display: none; }
        .sonuc-kart { display: inline-block; padding: 20px; border: 4px solid white; border-radius: 15px; background: #000; }
        
        /* ENVANTER */
        .envanter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .canavar-kart { background: #1a1a1a; border: 2px solid #333; border-radius: 10px; padding: 10px; text-align: center; font-size: 0.8rem; transition: 0.3s; }
        .canavar-kart img { width: 100%; height: 100px; object-fit: cover; border-radius: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="giris-ekrani">
        <div class="input-box">
            <h1 style="color: var(--neon-cyan)">SÜRÜ</h1>
            <p>Taşıyıcı Adınızı Girin</p>
            <input type="text" id="oyuncu-adi" placeholder="Örn: SoloLeveler">
            <br>
            <button onclick="sistemeGiris()">SİSTEMİ UYANDIR</button>
        </div>
    </div>

    <div id="oyun-ekrani">
        <div class="header">
            <div>Taşıyıcı: <span id="oyuncu-adi-display" style="color: var(--neon-cyan)">...</span></div>
            <div id="coin-display">💰 100</div>
        </div>

        <div class="gacha-area">
            <div id="gacha-normal">
                <h2>Gizemli Kutuyu Aç</h2>
                <button onclick="kutuAc()" style="padding: 20px 50px; font-size: 1.5rem;">AÇ (10 💰)</button>
            </div>

            <div id="gacha-bekleme">🌀 KUTU AÇILIYOR...</div>

            <div id="gacha-sonuc">
                <div class="sonuc-kart" id="sonuc-cerceve">
                    <h2 id="yeni-canavar-isim">...</h2>
                    <p id="yeni-canavar-nadir">...</p>
                    <button onclick="kapatSonuc()">TAMAM</button>
                </div>
            </div>
        </div>

        <h3>Envanterin</h3>
        <div class="envanter-grid" id="envanter-listesi">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, arrayUnion, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCzCI_RU9eE-MIeR-2jcwaLRz74hmRqnuQ",
          authDomain: "gameoftame-7c63f.firebaseapp.com",
          projectId: "gameoftame-7c63f",
          storageBucket: "gameoftame-7c63f.firebasestorage.app",
          messagingSenderId: "829948418870",
          appId: "1:829948418870:web:02373ec1d4b170049fb197"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let oyuncuEnvanteri = [];
        let canavarHavuzu = { yaygin: [], nadir: [], destansi: [], efsanevi: [], mitik: [] };

        // 1. CANAVARLARI YÜKLE
        async function canavarlariYukle() {
            const querySnapshot = await getDocs(collection(db, "canavarlar"));
            canavarHavuzu = { yaygin: [], nadir: [], destansi: [], efsanevi: [], mitik: [] };
            querySnapshot.forEach((doc) => {
                const c = doc.data();
                if(canavarHavuzu[c.nadirlik.toLowerCase()]) {
                    canavarHavuzu[c.nadirlik.toLowerCase()].push(c);
                } else {
                    canavarHavuzu.yaygin.push(c);
                }
            });
            console.log("Canavarlar yüklendi!");
        }

        // 2. GİRİŞ VE SPAM KONTROLÜ
        window.sistemeGiris = async function() {
            const isim = document.getElementById("oyuncu-adi").value;
            if(!isim) return;

            if (localStorage.getItem("cihazMuhru")) {
                alert("GÜVENLİK: Bu cihazda zaten bir hesap var!");
                return;
            }

            const docRef = await addDoc(collection(db, "players"), {
                username: isim,
                coins: 100,
                envanter: []
            });
            
            localStorage.setItem("oyuncuID", docRef.id);
            localStorage.setItem("cihazMuhru", "AKTIF");
            location.reload();
        };

        // 3. KUTU AÇMA (GACHA)
        window.kutuAc = async function() {
            if(canavarHavuzu.yaygin.length === 0) {
                alert("Veriler yükleniyor..."); return;
            }

            document.getElementById("gacha-normal").style.display = "none";
            document.getElementById("gacha-bekleme").style.display = "block";

            let r = Math.random();
            let secilen;

            if (r > 0.99 && canavarHavuzu.mitik.length > 0) secilen = canavarHavuzu.mitik;
            else if (r > 0.94 && canavarHavuzu.efsanevi.length > 0) secilen = canavarHavuzu.efsanevi;
            else if (r > 0.80 && canavarHavuzu.destansi.length > 0) secilen = canavarHavuzu.destansi;
            else if (r > 0.50 && canavarHavuzu.nadir.length > 0) secilen = canavarHavuzu.nadir;
            else secilen = canavarHavuzu.yaygin;

            const kazanc = secilen[Math.floor(Math.random() * secilen.length)];

            setTimeout(async () => {
                const id = localStorage.getItem("oyuncuID");
                await updateDoc(doc(db, "players", id), { envanter: arrayUnion(kazanc) });
                
                oyuncuEnvanteri.push(kazanc);
                document.getElementById("gacha-bekleme").style.display = "none";
                document.getElementById("gacha-sonuc").style.display = "block";
                
                const isimEtiket = document.getElementById("yeni-canavar-isim");
                isimEtiket.innerText = kazanc.isim;
                isimEtiket.style.color = kazanc.renk;
                document.getElementById("yeni-canavar-nadir").innerText = kazanc.nadirlik;
                document.getElementById("sonuc-cerceve").style.borderColor = kazanc.renk;
                
                arayuzuGuncelle();
            }, 3000);
        };

        window.kapatSonuc = function() {
            document.getElementById("gacha-sonuc").style.display = "none";
            document.getElementById("gacha-normal").style.display = "block";
        };

        // 4. BAŞLATICI
        async function sistemiBaslat() {
            const id = localStorage.getItem("oyuncuID");
            if(id) {
                await canavarlariYukle();
                const docSnap = await getDoc(doc(db, "players", id));
                if(docSnap.exists()) {
                    const data = docSnap.data();
                    oyuncuEnvanteri = data.envanter || [];
                    document.getElementById("giris-ekrani").style.display = "none";
                    document.getElementById("oyun-ekrani").style.display = "block";
                    document.getElementById("oyuncu-adi-display").innerText = data.username;
                    arayuzuGuncelle();
                }
            }
        }

        function arayuzuGuncelle() {
            const liste = document.getElementById("envanter-listesi");
            liste.innerHTML = "";
            oyuncuEnvanteri.forEach(c => {
                const item = document.createElement("div");
                item.className = "canavar-kart";
                item.style.borderColor = c.renk;
                item.innerHTML = `
                    <img src="${c.resim}">
                    <div style="color:${c.renk}; font-weight:bold">${c.isim}</div>
                    <div style="font-size:0.7rem; color:#888">${c.nadirlik}</div>
                `;
                liste.appendChild(item);
            });
        }

        sistemiBaslat();
    </script>
</body>
</html>
