<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürü - TAŞIYICI</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0; padding: 0; background-color: #050505; color: #fff;
            font-family: 'Roboto Mono', monospace; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .uyari {
            color: #ff3366; font-size: 1.5rem; letter-spacing: 5px; margin-bottom: 20px;
            animation: flash 1s infinite alternate; text-align: center;
        }

        .kod-ekrani {
            font-size: 12rem; font-weight: 700; color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.5), 0 0 50px rgba(0, 255, 204, 0.3);
            letter-spacing: 20px; margin-left: 20px; /* Ortalamayı düzeltmek için */
        }

        .btn-baslat {
            margin-top: 50px; background: transparent; border: 2px solid #00ffcc;
            color: #00ffcc; padding: 20px 40px; font-size: 1.5rem; font-family: inherit;
            border-radius: 10px; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 3px;
        }

        .btn-baslat:hover {
            background: #00ffcc; color: #000; box-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
        }

        @keyframes flash {
            from { opacity: 1; }
            to { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="uyari">SİSTEM YÜKLENİYOR...</div>
    <div class="kod-ekrani" id="aktif-kod">----</div>
    <button class="btn-baslat" id="kod-uret-btn" onclick="yeniKodUret()">Sinyali Başlat</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCzCI_RU9eE-MIeR-2jcwaLRz74hmRqnuQ",
          authDomain: "gameoftame-7c63f.firebaseapp.com",
          projectId: "gameoftame-7c63f",
          storageBucket: "gameoftame-7c63f.firebasestorage.app",
          messagingSenderId: "829948418870",
          appId: "1:829948418870:web:02373ec1d4b170049fb197"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Yeni Taşıyıcı Kodu Üret ve Veritabanına Yaz
        window.yeniKodUret = async function() {
            const uyariMetni = document.querySelector(".uyari");
            const kodEkrani = document.getElementById("aktif-kod");
            const btn = document.getElementById("kod-uret-btn");

            // Butonu geçici olarak devre dışı bırak
            btn.disabled = true;
            btn.style.opacity = "0.5";
            uyariMetni.innerText = "VERİTABANINA BAĞLANILIYOR...";
            uyariMetni.style.color = "#888";

            // Rastgele 4 haneli kod oluştur (1000 ile 9999 arası)
            const yeniKod = Math.floor(1000 + Math.random() * 9000).toString();

            try {
                // Kodu Firebase'de "gameState" klasörünün içindeki "carrier" dosyasına yaz!
                await setDoc(doc(db, "gameState", "carrier"), {
                    aktifKod: yeniKod,
                    olusturmaZamani: Date.now(),
                    durum: "aktif"
                });

                // Ekranda göster
                uyariMetni.innerText = "⚠ AKTİF TAŞIYICI SİNYALİ YAYINLANIYOR ⚠";
                uyariMetni.style.color = "#ff3366";
                kodEkrani.innerText = yeniKod;
                
            } catch (e) {
                console.error("Hata:", e);
                uyariMetni.innerText = "BAĞLANTI HATASI!";
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
                btn.innerText = "YENİ KOD ÜRET";
            }
        };

        // Sayfa açıldığında hazır bekle
        document.querySelector(".uyari").innerText = "SİSTEM HAZIR. SİNYAL BEKLENİYOR.";
    </script>
</body>
</html>
