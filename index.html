<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÜRÜ - Admin Paneli</title>
    <style>
        :root {
            --neon-green: #00ff00;
            --dark-bg: #0a0a0a;
            --panel-bg: #111;
        }
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #login-screen, #admin-panel {
            background: var(--panel-bg);
            padding: 40px;
            border: 2px solid var(--neon-green);
            border-radius: 10px;
            box-shadow: 0 0 20px var(--neon-green);
            text-align: center;
        }
        #admin-panel {
            display: none;
            width: 80%;
            height: 80%;
            overflow-y: auto;
        }
        h1 { color: var(--neon-green); text-transform: uppercase; letter-spacing: 2px; }
        input {
            background: black; border: 1px solid var(--neon-green); color: var(--neon-green);
            padding: 10px; margin: 10px 0; width: 80%; text-align: center; font-family: inherit;
        }
        button {
            background: var(--neon-green); color: black; border: none; padding: 10px 20px;
            cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s;
        }
        button:hover { background: white; box-shadow: 0 0 10px white; }
        
        .monster-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px;
        }
        .monster-card {
            background: #222; border: 1px solid #444; padding: 10px; border-radius: 5px; text-align: center;
        }
        .monster-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Sistem Girişi</h1>
        <p>Yönetici Şifresi Gerekiyor</p>
        <input type="password" id="admin-pass" placeholder="Şifreyi Girin">
        <br>
        <button onclick="checkPassword()">SİSTEME ERİŞ</button>
    </div>

    <div id="admin-panel">
        <h1>SÜRÜ Yönetim Paneli</h1>
        <p>Veritabanı Durumu: <span style="color: var(--neon-green)">ÇEVRİMİÇİ</span></p>
        
        <h3>Kayıtlı Canavarlar</h3>
        <div class="monster-grid" id="monster-list">
            </div>
    </div>

    <script type="module">
        // FİREBASE BAĞLANTISI
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCzCI_RU9eE-MIeR-2jcwaLRz74hmRqnuQ",
          authDomain: "gameoftame-7c63f.firebaseapp.com",
          projectId: "gameoftame-7c63f",
          storageBucket: "gameoftame-7c63f.firebasestorage.app",
          messagingSenderId: "829948418870",
          appId: "1:829948418870:web:02373ec1d4b170049fb197"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ŞİFRE KONTROLÜ
        window.checkPassword = function() {
            const pass = document.getElementById("admin-pass").value;
            // ŞİFRE BURADA! "suru2024" veya kendi istediğin şifreyi yap.
            if(pass === "suru2024") { 
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("admin-panel").style.display = "block";
                loadMonsters();
            } else {
                alert("ERİŞİM REDDEDİLDİ!");
            }
        };

        // CANAVARLARI FİREBASE'DEN ÇEK VE EKRANA YAZDIR
        async function loadMonsters() {
            const listDiv = document.getElementById("monster-list");
            listDiv.innerHTML = "<p>Veriler Yükleniyor...</p>";

            try {
                // Burada "canavarlar" koleksiyonunu çekiyoruz
                const querySnapshot = await getDocs(collection(db, "canavarlar"));
                listDiv.innerHTML = ""; // Yükleniyor yazısını sil
                
                let count = 0;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    count++;
                    
                    const card = document.createElement("div");
                    card.className = "monster-card";
                    // Eğer veritabanında renk yoksa varsayılan beyaz yap
                    const renk = data.renk || "#ffffff"; 
                    
                    card.innerHTML = `
                        <img src="${data.resim}" alt="${data.isim}">
                        <h4 style="color: ${renk}; margin: 10px 0 5px 0;">${data.isim}</h4>
                        <p style="margin: 0; font-size: 12px; color: #aaa;">Nadirlik: ${data.nadirlik}</p>
                    `;
                    listDiv.appendChild(card);
                });

                if(count === 0) {
                    listDiv.innerHTML = "<p style='color:red;'>Veritabanında hiç canavar bulunamadı! Önce Python botunu çalıştır.</p>";
                }
            } catch (error) {
                console.error("Veri çekme hatası:", error);
                listDiv.innerHTML = "<p style='color:red;'>Veritabanı bağlantı hatası!</p>";
            }
        }
    </script>
</body>
</html>
