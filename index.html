<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROJECT: OVERRIDE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050508;
            --surface: rgba(20, 20, 30, 0.7);
            --cyan: #00f3ff;
            --magenta: #ff003c;
            --gold: #ffaa00;
            --text-main: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main); 
            font-family: 'Rajdhani', sans-serif; height: 100vh; display: flex; flex-direction: column; 
            overflow: hidden; background-image: radial-gradient(circle at 50% 0%, #111122 0%, #050508 70%);
        }

        h1, h2, h3 { font-family: 'Orbitron', sans-serif; margin: 0; }

        /* Top Header */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center; padding: 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            z-index: 10;
        }
        .user-info .name { font-size: 1.4rem; font-weight: 700; color: var(--cyan); text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }
        .user-info .rank { font-size: 0.9rem; color: #888; }
        .currency { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--gold); }

        /* Main Content Area */
        .view-container { flex: 1; position: relative; overflow-y: auto; padding: 0 20px 80px 20px; }
        .view { display: none; animation: fadeIn 0.3s ease-in-out; }
        .view.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- RADAR VIEW (The Hunt) --- */
        .radar-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; margin-top: 20px; }
        .radar-circle {
            width: 250px; height: 250px; border-radius: 50%; border: 2px solid rgba(0, 243, 255, 0.2);
            position: relative; display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 40px rgba(0, 243, 255, 0.05);
        }
        .radar-sweep {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 70%, rgba(0, 243, 255, 0.4) 100%);
            animation: sweep 2s linear infinite;
        }
        @keyframes sweep { to { transform: rotate(360deg); } }
        
        .status-text { margin-top: 30px; font-size: 1.2rem; letter-spacing: 2px; color: var(--cyan); text-align: center; }
        .host-input-container { margin-top: 30px; width: 100%; text-align: center; }
        .host-input {
            background: rgba(0,0,0,0.5); border: 1px solid var(--cyan); color: #fff; font-size: 2rem;
            text-align: center; padding: 15px; width: 80%; border-radius: 10px; font-family: 'Orbitron', sans-serif;
            outline: none; box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); transition: 0.3s;
        }
        .host-input:focus { box-shadow: 0 0 25px rgba(0, 243, 255, 0.6); }

        .btn-hack {
            margin-top: 15px; background: var(--cyan); color: #000; border: none; padding: 15px 40px;
            font-size: 1.2rem; font-family: 'Orbitron', sans-serif; font-weight: 900; border-radius: 5px;
            cursor: pointer; text-transform: uppercase; width: 80%; box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
        }

        /* --- VAULT VIEW (Inventory) --- */
        .vault-header { text-align: center; margin-bottom: 20px; }
        .vault-header h2 { color: #fff; letter-spacing: 3px; font-size: 1.8rem; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        /* Gacha Cards */
        .card {
            background: var(--surface); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 15px; text-align: center; position: relative; overflow: hidden;
        }
        .card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%); opacity: 0; transition: 0.3s; }
        .card:hover::before { opacity: 1; }

        .card.apex { border-color: var(--magenta); box-shadow: 0 0 20px rgba(255, 0, 60, 0.2); }
        .card.sovereign { border-color: var(--gold); box-shadow: 0 0 20px rgba(255, 170, 0, 0.3); }

        .pet-image-placeholder {
            width: 80px; height: 80px; margin: 0 auto 10px auto; border-radius: 10px;
            background: linear-gradient(45deg, #111, #222); border: 1px solid #333;
            display: flex; justify-content: center; align-items: center; font-size: 2rem;
        }
        .apex .pet-image-placeholder { background: linear-gradient(45deg, #300, #500); border-color: var(--magenta); }
        .sovereign .pet-image-placeholder { background: linear-gradient(45deg, #331a00, #553300); border-color: var(--gold); }

        .pet-name { font-family: 'Orbitron', sans-serif; font-size: 1rem; color: #fff; }
        .pet-tier { font-size: 0.8rem; font-weight: bold; margin-top: 5px; }
        .apex .pet-tier { color: var(--magenta); }
        .sovereign .pet-tier { color: var(--gold); }

        /* Bottom Nav Bar */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 20;
        }
        .nav-item {
            color: #666; font-family: 'Orbitron', sans-serif; font-size: 0.9rem; text-align: center;
            flex: 1; padding: 15px 0; cursor: pointer; transition: 0.3s;
        }
        .nav-item.active { color: var(--cyan); text-shadow: 0 0 10px rgba(0, 243, 255, 0.6); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="user-info">
            <div class="name">GHOST_PROTO</div>
            <div class="rank">Lvl 14 Hunter</div>
        </div>
        <div class="currency">⌬ 2,450</div>
    </div>

    <div class="view-container">
        
        <div id="view-radar" class="view active">
            <div class="radar-wrapper">
                <div class="radar-circle">
                    <div class="radar-sweep"></div>
                    <h2 style="color: rgba(255,255,255,0.2);">SCANNING</h2>
                </div>
                <div class="status-text">NO HOSTS DETECTED</div>
                
                <div class="host-input-container">
                    <p style="color: #888; font-size: 0.9rem;">MANUAL OVERRIDE CODE</p>
                    <input type="number" class="host-input" placeholder="----">
                    <button class="btn-hack">BREACH</button>
                </div>
            </div>
        </div>

        <div id="view-vault" class="view">
            <div class="vault-header">
                <h2>THE VAULT</h2>
                <p style="color: #888;">Captured Animas</p>
            </div>
            
            <div class="grid">
                <div class="card">
                    <div class="pet-image-placeholder">🐺</div>
                    <div class="pet-name">DATA_WOLF</div>
                    <div class="pet-tier" style="color: #888;">STANDARD</div>
                </div>

                <div class="card">
                    <div class="pet-image-placeholder">🦅</div>
                    <div class="pet-name">AERO_STRIKE</div>
                    <div class="pet-tier" style="color: var(--cyan);">HIGH-END</div>
                </div>

                <div class="card apex">
                    <div class="pet-image-placeholder">🦖</div>
                    <div class="pet-name">MECHA_REX</div>
                    <div class="pet-tier">APEX TIER</div>
                </div>

                <div class="card sovereign">
                    <div class="pet-image-placeholder">🐉</div>
                    <div class="pet-name">VOID_DRAGON</div>
                    <div class="pet-tier">SOVEREIGN</div>
                </div>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchView('radar', this)">[ RADAR ]</div>
        <div class="nav-item" onclick="switchView('vault', this)">[ VAULT ]</div>
    </div>

    <script>
        // Simple logic to switch between the Radar and the Vault
        function switchView(viewName, element) {
            // Hide all views
            document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
            // Remove active state from nav buttons
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            
            // Show selected view
            document.getElementById('view-' + viewName).classList.add('active');
            // Highlight clicked nav button
            element.classList.add('active');
        }
    </script>
</body>
</html>
