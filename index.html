<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürü - Ana Üs</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --arka-plan: #0f1015; --panel: #1a1c23; --vurgu-renk: #00ffcc;
            --kirmizi-alarm: #ff3366; --metin: #ffffff; --metin-soluk: #8a8d98; --altin: #ffd700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: var(--arka-plan); color: var(--metin); font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #giris-ekrani { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--arka-plan); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .giris-kutu { background: var(--panel); padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #2a2c35; }
        .input-text { width: 100%; padding: 15px; margin: 20px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; font-size: 1.2rem; text-align: center; outline: none; font-family: 'Roboto Mono', monospace; }
        #kullanici-adi { text-transform: lowercase; }
        #kullanici-pin { letter-spacing: 5px; }
        .input-text:focus { border-color: var(--vurgu-renk); }
        .input-text:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn { background: var(--metin); color: #000; border: none; padding: 15px 30px; font-size: 1.1rem; font-weight: 900; border-radius: 10px; cursor: pointer; width: 100%; transition: 0.2s; text-transform: uppercase; }
        .btn:hover:not(:disabled) { background: var(--vurgu-renk); transform: scale(0.98); }
        .btn:disabled { background: #555; color: #222; cursor: not-allowed; }

        .ust-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--panel); border-bottom: 1px solid #2a2c35; flex-wrap: wrap; gap: 10px; }
        .oyuncu-isim { font-size: 1.3rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        .oyuncu-rutbe { font-size: 0.8rem; color: var(--vurgu-renk); text-transform: uppercase; letter-spacing: 2px; }
        .ust-sag { display: flex; align-items: center; gap: 15px; }
        .btn-sirala { background: transparent; color: var(--altin); border: 1px solid var(--altin); padding: 5px 10px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.9rem;}
        .btn-sirala:hover { background: var(--altin); color: #000; }

        /* MOBİL UYUMLU DÜZEN */
        .ana-ekran { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
        .sol-panel { padding: 20px; border-bottom: 1px solid #2a2c35; }
        .sag-panel { background: #14151b; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }

        @media (min-width: 768px) {
            .ana-ekran { flex-direction: row; height: calc(100vh - 80px); overflow: hidden; }
            .sol-panel { flex: 1; overflow-y: auto; border-right: 1px solid #2a2c35; border-bottom: none; }
            .sag-panel { width: 400px; justify-content: center; }
        }

        .baslik { font-size: 1.2rem; color: var(--metin-soluk); margin-bottom: 20px; font-weight: 700; letter-spacing: 1px; text-align: center; }
        .koleksiyon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .canavar-kart { background: #111; border: 1px solid #333; border-radius: 15px; padding: 15px; text-align: center; position: relative; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .canavar-resim { width: 100%; height: 100px; background: #222; border-radius: 10px; margin: 0 auto 10px auto; overflow: hidden; border: 1px solid #444; }
        .canavar-resim img { width: 100%; height: 100%; object-fit: cover; }
        .canavar-isim { font-weight: 900; font-size: 0.95rem; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .nadir-etiket { font-size: 0.7rem; font-weight: 900; padding: 4px 8px; border-radius: 5px; background: #000; display: inline-block; letter-spacing: 1px; }

        .radar-uyari { color: var(--kirmizi-alarm); font-weight: 900; font-size: 1.1rem; letter-spacing: 1px; margin-bottom: 30px; text-align: center; }
        @keyframes yanipSonme { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .kod-kutusu { background: #000; border: 2px solid #333; border-radius: 15px; padding: 25px; text-align: center; width: 100%; max-width: 350px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); margin: 0 auto; }
        .kod-input { background: transparent; border: none; color: #fff; font-size: 3.5rem; width: 100%; text-align: center; font-family: 'Roboto Mono', monospace; outline: none; letter-spacing: 10px; margin-bottom: 20px;}
        .kod-input::placeholder { color: #333; }
        
        .btn-cevir { background: var(--kirmizi-alarm); color: #fff; padding: 15px; font-size: 1.1rem; border-radius: 10px; width: 100%; font-weight: 900; letter-spacing: 2px; border: none; cursor: pointer; transition: 0.2s; }
        .btn-cevir:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 51, 102, 0.4); }
        .btn-cevir:disabled { background: #333; color: #666; cursor: not-allowed; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; display: none; flex-direction: column; justify-content: center; align-items: center; }
        
        .gacha-kapsul { width: 150px; height: 150px; background: #111; border-radius: 50%; border: 5px solid #555; display: flex; justify-content: center; align-items: center; font-size: 4rem; animation: hizliTitre 0.1s infinite; }
        @keyframes hizliTitre { 0% { transform: translate(2px, 1px) rotate(0deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
        .gacha-sonuc { display: none; text-align: center; animation: dropIn 0.5s forwards; }
        @keyframes dropIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .yeni-resim { width: 200px; height: 200px; background: #000; border-radius: 20px; margin: 0 auto 20px auto; border: 4px solid #fff; box-shadow: 0 0 50px rgba(255,255,255,0.2); overflow: hidden; }
        .yeni-resim img { width: 100%; height: 100%; object-fit: cover; }

        .liderlik-kutu { background: var(--panel); border: 2px solid var(--altin); border-radius: 15px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; padding: 20px; text-align: center; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); }
        .sira-satir { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 15px; margin-bottom: 10px; border-radius: 10px; border-left: 4px solid #333; }
        .sira-1 { border-color: var(--altin); background: rgba(255, 215, 0, 0.1); }
        .sira-2 { border-color: #c0c0c0; background: rgba(192, 192, 192, 0.1); }
        .sira-3 { border-color: #cd7f32; background: rgba(205, 127, 50, 0.1); }
        .sira-isim { font-weight: bold; font-size: 1rem; text-transform: uppercase; }
        .sira-skor { font-family: 'Roboto Mono', monospace; color: var(--vurgu-renk); font-size: 1rem; }
    </style>
</head>
<body>

    <div id="giris-ekrani">
        <div class="giris-kutu">
            <h1 style="font-size: 2rem; margin-bottom: 10px;">PROJE: SÜRÜ</h1>
            <p style="color: var(--metin-soluk); font-size: 0.9rem;">Sisteme bağlanmak için adını ve PIN'ini gir.</p>
            <input type="text" id="kullanici-adi" class="input-text" placeholder="İSİM" maxlength="12">
            <input type="password" id="kullanici-pin" class="input-text" placeholder="4 HANELİ PİN" maxlength="4" pattern="\d*">
            <button class="btn" id="baglan-btn" onclick="hesapOlustur()">SİSTEM YÜKLENİYOR...</button>
            <p id="giris-durum" style="margin-top: 15px; color: var(--kirmizi-alarm); font-weight: bold;"></p>
            
            <button onclick="muhruSifirla()" style="margin-top: 10px; background: transparent; color: #555; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem;">Cihaz Mührünü Sıfırla</button>
        </div>
    </div>

    <div id="ana-uygulama" style="display: none; height: 100%; flex-direction: column;">
        <div class="ust-bar">
            <div>
                <div class="oyuncu-isim" id="ekran-isim">AVCI</div>
                <div class="oyuncu-rutbe"><span id="oyuncu-seviye-text">Seviye 1 Avcı</span> <span style="color:white;">|</span> <span id="oyuncu-puan-text" style="color:var(--altin);">0 Puan</span></div>
            </div>
            <div class="ust-sag">
                <button class="btn-sirala" onclick="liderlikAc()">🏆 SIRALAMA</button>
                <div style="font-family: 'Roboto Mono', monospace; font-size: 1rem; color: var(--vurgu-renk);">
                    KAPASİTE: <span id="koleksiyon-sayisi">0</span>/∞
                </div>
            </div>
        </div>

        <div class="ana-ekran">
            <div class="sol-panel">
                <div class="baslik">KOLEKSİYONUN</div>
                <div class="koleksiyon-grid" id="envanter-listesi"></div>
            </div>

            <div class="sag-panel">
                <div id="radar-durum" class="radar-uyari" style="color: var(--metin-soluk); animation: none;">📡 RADAR: SİNYAL ARANIYOR...</div>
                
                <div id="avci-modu" class="kod-kutusu">
                    <p style="color: #666; font-weight: bold; margin-top: 0; font-size: 0.9rem;">TAŞIYICI KODUNU GİR</p>
                    <input type="text" id="hedef-kod" class="kod-input" placeholder="-----" maxlength="5" disabled>
                    <button class="btn-cevir" onclick="koduCozVeCevir()" disabled>KODU ÇÖZ & ÇEVİR</button>
                </div>

                <div id="tasiyici-modu" class="kod-kutusu" style="display: none; border-color: var(--kirmizi-alarm); box-shadow: inset 0 0 40px rgba(255,51,102,0.4);">
                    <h2 style="color: var(--kirmizi-alarm); margin-top: 0; animation: yanipSonme 1s infinite; font-size: 1.2rem;">⚠ SEN TAŞIYICISIN ⚠</h2>
                    <p style="color: #fff; font-size: 0.8rem;">Diğer avcılar seni arıyor. Kodu onlara göster!</p>
                    <div style="font-size: 3.5rem; color: #fff; font-weight: 900; background: var(--kirmizi-alarm); padding: 10px; border-radius: 10px; margin-top: 20px; font-family: 'Roboto Mono', monospace;">
                        <span id="benim-kodum">-----</span>
                    </div>
                </div>
                <button onclick="cikisYap()" style="margin-top: 30px; background: transparent; color: #555; border: 1px solid #555; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Sistemden Çık</button>
            </div>
        </div>
    </div>

    <div id="liderlik-ekrani" class="modal-overlay">
        <div class="liderlik-kutu">
            <h2 style="color: var(--altin); margin-top: 0;">🏆 LİDERLİK TABLOSU</h2>
            <div id="liderlik-listesi" style="margin-top: 20px; text-align: left;"></div>
            <button class="btn" style="margin-top: 20px; background: #333; color: white;" onclick="liderlikKapat()">KAPAT</button>
        </div>
    </div>

    <div id="gacha-ekrani" class="modal-overlay">
        <div id="gacha-bekleme" class="gacha-kapsul">?</div>
        <div id="gacha-sonuc" class="gacha-sonuc">
            <h2 id="gacha-baslik" style="color: var(--vurgu-renk); letter-spacing: 5px; margin-bottom: 20px; font-size: 1.5rem;">VERİ ÇEKİLDİ!</h2>
            <div class="yeni-resim" id="gacha-resim-cerceve"><img id="yeni-canavar-img" src="" alt="Canavar"></div>
            <h1 id="yeni-canavar-isim" style="font-size: 2rem; margin-bottom: 5px;">---</h1>
            <p id="yeni-canavar-nadir" class="nadir-etiket" style="font-size: 1rem; margin-bottom: 20px;">---</p><br>
            <button class="btn" style="width: 200px; background: #fff;" onclick="gachaKapat()">KABUL ET</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>

    <script type="module">
        import { doc, getDoc, setDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        
        let oyuncu = { isim: "", puan: 0, envanter: [], id: "" };
        const nadirlikPuanlari = { "yaygın": 2, "nadir": 5, "destansı": 15, "efsanevi": 50 };
        
        // 🔥 HİLE KORUMASI: AUTO CLICKER ENGELİ
        let butonKilitli = false; 

        // --- CİHAZ MÜHRÜ KONTROLÜ ---
        window.onload = function() {
            const cihazMuhru = localStorage.getItem("cihazMuhru");
            if (cihazMuhru) {
                const isimKutusu = document.getElementById("oyuncu-adi");
                isimKutusu.value = cihazMuhru;
                isimKutusu.disabled = true; // İsmi değiştirmesini engeller!
                document.getElementById("hata-msj").innerText = "🔒 Cihaz Mührü Aktif. Yeni hesap açılamaz.";
                document.getElementById("hata-msj").style.display = "block";
                document.getElementById("hata-msj").style.color = "var(--vurgu-renk)";
            }
        };

        function zamanDurumuKontrol() {
            const simdi = new Date();
            const toplamDakika = (simdi.getHours() * 60) + simdi.getMinutes();
            const zamanCizelgesi = [
                { bas: 540, bit: 580, tur: "ders", ad: "1. Ders" },
                { bas: 580, bit: 590, tur: "teneffus", ad: "Teneffüs" },
                { bas: 590, bit: 630, tur: "ders", ad: "2. Ders" },
                { bas: 630, bit: 640, tur: "teneffus", ad: "Teneffüs" },
                { bas: 640, bit: 680, tur: "ders", ad: "3. Ders" },
                { bas: 680, bit: 690, tur: "teneffus", ad: "Teneffüs" },
                { bas: 690, bit: 730, tur: "ders", ad: "4. Ders" },
                { bas: 730, bit: 770, tur: "teneffus", ad: "Öğle Arası" },
                { bas: 770, bit: 810, tur: "ders", ad: "5. Ders" },
                { bas: 810, bit: 820, tur: "teneffus", ad: "Teneffüs" },
                { bas: 820, bit: 860, tur: "ders", ad: "6. Ders" },
                { bas: 860, bit: 870, tur: "teneffus", ad: "Teneffüs" },
                { bas: 870, bit: 910, tur: "ders", ad: "7. Ders" },
                { bas: 910, bit: 920, tur: "teneffus", ad: "Teneffüs" },
                { bas: 920, bit: 960, tur: "ders", ad: "8. Ders" }
            ];
            let durum = { tur: "ders", ad: "Okul Dışı veya Derste" }; 
            for (let z of zamanCizelgesi) { if (toplamDakika >= z.bas && toplamDakika < z.bit) { durum = z; break; } }
            return durum;
        }

        window.oyunaBasla = async function() {
            const isim = document.getElementById("oyuncu-adi").value.trim();
            if (!isim) { document.getElementById("hata-msj").style.display = "block"; return; }
            
            oyuncu.isim = isim;
            oyuncu.id = "p-" + isim.toLowerCase().replace(/\s/g, "-");
            
            try {
                const userRef = doc(window.db, "players", oyuncu.id);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    oyuncu = userSnap.data();
                    oyuncu.id = userSnap.id;
                } else {
                    // Kayıt olurken mühür kontrolü (gizli sekme kullanmıyorsa engeller)
                    if (localStorage.getItem("cihazMuhru") && localStorage.getItem("cihazMuhru") !== isim) {
                        alert("Bu cihazda zaten kayıtlı bir kimliğin var. Başka hesap açamazsın!");
                        return;
                    }
                    await setDoc(userRef, { isim: isim, puan: 0, envanter: [], seviye: 1 });
                    oyuncu = { isim: isim, puan: 0, envanter: [], id: userRef.id };
                }

                localStorage.setItem("cihazMuhru", isim); // Cihaza kalıcı mühür bas

                document.getElementById("giris-ekrani").style.display = "none";
                document.getElementById("oyun-paneli").style.display = "flex";
                arayuzuGuncelle();
            } catch (e) { console.error(e); alert("Bağlantı hatası! Lütfen internetinizi kontrol edin."); }
        };

        window.koduGir = async function() {
            // 🔥 SPAM VE AUTO-CLICKER KORUMASI: Buton zaten çalışıyorsa işlemi reddet!
            if (butonKilitli) return; 

            const girilenKod = document.getElementById("kod-input").value.trim();
            if (girilenKod.length !== 4) return alert("Kod 4 haneli olmalı!");

            const durum = zamanDurumuKontrol();
            if (durum.tur === "ders") {
                alert(`Sinyal Kesildi! Şu an ${durum.ad} vaktindeyiz. Avlanmak için teneffüsü beklemelisin.`);
                return;
            }

            butonKilitli = true; // İŞLEM BAŞLADI, DİĞER TIKLAMALARI KİLİTLE

            try {
                const gameSnap = await getDoc(doc(window.db, "gameState", "carrier"));
                const gameData = gameSnap.data();

                if (gameData && gameData.aktifKod === girilenKod && gameData.durum === "aktif") {
                    
                    // 🔥 KRİTİK HAMLE: Kodu doğru girdiği ilk milisaniyede sistemi PASİF yapar, başkası (veya kendi auto-clicker'ı) alamaz!
                    await updateDoc(doc(window.db, "gameState", "carrier"), { durum: "kullanildi" });

                    document.getElementById("gacha-ekrani").style.display = "flex";
                    document.getElementById("gacha-bekleme").style.display = "block";
                    document.getElementById("gacha-sonuc").style.display = "none";

                    const monstersSnap = await getDocs(collection(window.db, "canavarlar"));
                    const allMonsters = monstersSnap.docs.map(d => d.data());
                    const secilen = allMonsters[Math.floor(Math.random() * allMonsters.length)];

                    oyuncu.envanter.push(secilen);
                    let yeniPuan = 0;
                    oyuncu.envanter.forEach(c => yeniPuan += (nadirlikPuanlari[c.nadirlik.toLowerCase()] || 2));
                    oyuncu.puan = yeniPuan;

                    await updateDoc(doc(window.db, "players", oyuncu.id), {
                        envanter: oyuncu.envanter,
                        puan: oyuncu.puan
                    });

                    setTimeout(() => {
                        document.getElementById("gacha-bekleme").style.display = "none";
                        document.getElementById("gacha-sonuc").style.display = "block";
                        document.getElementById("yeni-canavar-img").src = secilen.resim;
                        document.getElementById("yeni-canavar-isim").innerText = secilen.isim.replace(/_/g, " ");
                        document.getElementById("yeni-canavar-nadir").innerText = secilen.nadirlik.toUpperCase();
                        
                        const renk = secilen.nadirlik.toLowerCase() === "destansı" ? "#ff3366" : "#00ffcc";
                        document.getElementById("gacha-resim-cerceve").style.borderColor = renk;
                        document.getElementById("yeni-canavar-nadir").style.background = renk;
                        arayuzuGuncelle();
                        
                        butonKilitli = false; // İŞLEM BİTTİ, KİLİDİ AÇ
                    }, 2000);

                } else { 
                    alert("GEÇERSİZ VEYA ZATEN KULLANILMIŞ KOD!"); 
                    butonKilitli = false; 
                }
            } catch (e) { 
                console.error(e); 
                alert("Kod doğrulanamadı."); 
                butonKilitli = false; 
            }
        };

        function arayuzuGuncelle() {
            document.getElementById("ekran-isim").innerText = oyuncu.isim.toUpperCase();
            document.getElementById("ekran-puan").innerText = oyuncu.puan;
            const kol = document.getElementById("koleksiyon");
            kol.innerHTML = "";
            oyuncu.envanter.slice().reverse().forEach(c => {
                const renk = c.nadirlik.toLowerCase() === "destansı" ? "#ff3366" : "#00ffcc";
                kol.innerHTML += `
                    <div class="canavar-kart">
                        <img src="${c.resim}" class="kart-img">
                        <div class="kart-isim">${c.isim.replace(/_/g, " ")}</div>
                        <div class="kart-nadir" style="background:${renk}">${c.nadirlik}</div>
                    </div>
                `;
            });
        }

        window.liderlikAc = async function() {
            document.getElementById("liderlik-ekrani").style.display = "flex";
            const liste = document.getElementById("liderlik-listesi");
            liste.innerHTML = "<div class='yukleniyor-spinner'></div>";
            
            try {
                const snap = await getDocs(collection(window.db, "players"));
                let oyuncular = [];
                snap.forEach(d => {
                    const data = d.data();
                    if(data.isim) oyuncular.push(data);
                });
                
                oyuncular.sort((a, b) => b.puan - a.puan);
                liste.innerHTML = "";
                oyuncular.slice(0, 10).forEach((o, i) => {
                    const siraSinifi = i === 0 ? "sira-1" : i === 1 ? "sira-2" : i === 2 ? "sira-3" : "";
                    liste.innerHTML += `
                        <div class="sira-satir ${siraSinifi}">
                            <div class="sira-isim">#${i+1} ${o.isim}</div>
                            <div class="sira-skor">${o.puan} Puan</div>
                        </div>
                    `;
                });
            } catch (e) { liste.innerHTML = "Veriler yüklenemedi."; }
        };

        window.gachaKapat = () => document.getElementById("gacha-ekrani").style.display = "none";
        window.cikisYap = () => { location.reload(); };
    </script>

</body>
</html>
